
name: Build LEDE Firmware from GPT

on:
  workflow_dispatch:
    inputs:
      device:
        description: "设备"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - r2s
          - cr660x
          - ax6000
          - x86_64
          - raspberrypi-4b

  schedule:
    - cron: "0 20 * * 0"

permissions:
  contents: write

env:
  TZ: Asia/Shanghai
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

  CCACHE_DIR: ~/.ccache
  CCACHE_COMPRESS: "true"
  CCACHE_MAXSIZE: 2G

jobs:
  setup:
    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - id: set-matrix
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && \
             [ "${{ github.event.inputs.device }}" != "all" ]; then

            echo 'matrix={"device":["${{ github.event.inputs.device }}"]}' >> $GITHUB_OUTPUT

          else

            echo 'matrix={"device":["r2s","cr660x","ax6000","x86_64","raspberrypi-4b"]}' >> $GITHUB_OUTPUT

          fi

  build:
    needs: setup

    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}

    name: Build LEDE for ${{ matrix.device }}

    steps:
      ########################################################################
      # Checkout
      ########################################################################

      - name: Checkout builder config
        uses: actions/checkout@v4

      - name: Checkout LEDE source
        uses: actions/checkout@v4
        with:
          repository: coolsnowwolf/lede
          ref: master
          path: lede
          fetch-depth: 1

      ########################################################################
      # Free Disk Space
      ########################################################################

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo docker image prune -af

          df -h

      ########################################################################
      # Cache
      ########################################################################

      - name: Cache downloads
        uses: actions/cache@v4
        with:
          path: lede/dl
          key: dl-${{ matrix.device }}-${{ hashFiles('configs/immortalwrt/**') }}
          restore-keys: |
            dl-${{ matrix.device }}-
            dl-

      - name: Cache feeds
        uses: actions/cache@v4
        with:
          path: lede/feeds
          key: feeds-${{ hashFiles('configs/immortalwrt/**') }}
          restore-keys: |
            feeds-

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ matrix.device }}-${{ hashFiles('configs/immortalwrt/**') }}
          restore-keys: |
            ccache-${{ matrix.device }}-
            ccache-

      ########################################################################
      # System Dependencies
      ########################################################################

      - name: Setup dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            build-essential \
            clang \
            flex \
            bison \
            g++ \
            gawk \
            gettext \
            git \
            libssl-dev \
            libelf-dev \
            python3 \
            python3-dev \
            python3-distutils \
            rsync \
            unzip \
            zlib1g-dev \
            file \
            wget \
            subversion \
            patch \
            upx-ucl \
            ccache \
            ecj \
            fastjar \
            java-propose-classpath \
            libncurses5-dev \
            libncursesw5-dev \
            libz-dev \
            curl \
            cmake \
            jq \
            rename \
            tar

      ########################################################################
      # Configure Feeds
      ########################################################################

      - name: Setup feeds and custom packages
        run: bash ${{ github.workspace }}/scripts/setup-custom-packages.sh lede append

      ########################################################################
      # Copy Custom Files
      ########################################################################

      - name: Copy custom files
        run: |
          cd lede

          if [ -d "${{ github.workspace }}/files" ]; then

            cp -rf ${{ github.workspace }}/files/* ./

            chmod +x files/etc/uci-defaults/* 2>/dev/null || true
            chmod +x etc/uci-defaults/* 2>/dev/null || true

          fi

      ########################################################################
      # Generate Config
      ########################################################################

      - name: Generate .config
        run: |
          cd lede

          if [ ! -f "${{ github.workspace }}/configs/immortalwrt/common.config" ]; then
            echo "ERROR: common.config not found"
            exit 1
          fi

          if [ ! -f "${{ github.workspace }}/configs/immortalwrt/${{ matrix.device }}.config" ]; then
            echo "ERROR: ${{ matrix.device }}.config not found"
            exit 1
          fi

          cat ${{ github.workspace }}/configs/immortalwrt/common.config > .config
          cat ${{ github.workspace }}/configs/immortalwrt/${{ matrix.device }}.config >> .config
          cat ${{ github.workspace }}/configs/custom-plugins.config >> .config

          echo "CONFIG_DEVEL=y" >> .config
          echo "CONFIG_CCACHE=y" >> .config

          make defconfig

      ########################################################################
      # Setup Go
      ########################################################################

      - name: Setup Go
        run: |
          GO_VERSION="1.24.2"

          wget -q https://go.dev/dl/go${GO_VERSION}.linux-amd64.tar.gz

          sudo rm -rf /usr/local/go

          sudo tar -C /usr/local -xzf go${GO_VERSION}.linux-amd64.tar.gz

          echo "/usr/local/go/bin" >> $GITHUB_PATH
          echo "GOROOT=/usr/local/go" >> $GITHUB_ENV

      ########################################################################
      # Download Sources
      ########################################################################

      - name: Download sources
        run: |
          cd lede

          make download -j8 || make download -j1 V=s

      ########################################################################
      # Build Toolchain
      ########################################################################

      - name: Build toolchain
        run: |
          cd lede

          export PATH=/usr/local/go/bin:$PATH
          export GOROOT=/usr/local/go

          go version

          make toolchain/compile -j$(nproc) || make toolchain/compile -j1 V=s

      ########################################################################
      # Compile Firmware
      ########################################################################

      - name: Compile firmware
        run: |
          cd lede

          export PATH="/usr/lib/ccache:$PATH"

          ulimit -n 65535

          echo "Build started: $(date)"

          ccache -z

          make -j$(nproc) || make -j1 V=s

          echo "Build finished: $(date)"

          ccache -s

      ########################################################################
      # Prepare Artifacts
      ########################################################################

      - name: Prepare artifacts
        run: |
          cd lede

          mkdir -p ../release/${{ matrix.device }}

          find bin/targets/ -type f \
            \( \
              -name "*.img.gz" -o \
              -name "*.bin" -o \
              -name "*.vmdk" -o \
              -name "*.qcow2" -o \
              -name "*.sdcard.img" -o \
              -name "*-sysupgrade.*" \
            \) \
            -exec cp {} ../release/${{ matrix.device }}/ \;

          cd ../release/${{ matrix.device }}

          if ! ls * >/dev/null 2>&1; then
            echo "ERROR: no firmware artifacts found"
            exit 1
          fi

          sha256sum * > sha256sums.txt
          echo "Generated firmware files:"
          ls -lh

      ########################################################################
      # Upload Artifacts
      ########################################################################

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lede-${{ matrix.device }}
          path: release/${{ matrix.device }}
          retention-days: 7

      ########################################################################
      # Release
      ########################################################################

      - name: Release
        if: success() && github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: LEDE-${{ matrix.device }}-${{ github.run_number }}

          name: LEDE Firmware for ${{ matrix.device }} - Build ${{ github.run_number }}

          body: |
            ## LEDE 固件自动构建

            - Device: ${{ matrix.device }}
            - Build Number: ${{ github.run_number }}
            - Default IP: http://10.10.10.1
            - Username: root
            - Password: password

          files: |
            release/${{ matrix.device }}/*.img.gz
            release/${{ matrix.device }}/*.bin
            release/${{ matrix.device }}/*.vmdk
            release/${{ matrix.device }}/*.qcow2
            release/${{ matrix.device }}/*.sdcard.img
            release/${{ matrix.device }}/*-sysupgrade.*

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
