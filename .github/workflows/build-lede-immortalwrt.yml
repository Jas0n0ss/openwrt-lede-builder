name: Build OpenWrt (LEDE + ImmortalWrt)

on:
  workflow_dispatch:
    inputs:
      source:
        description: "选择源码"
        type: choice
        required: true
        default: immortalwrt
        options:
          - immortalwrt
          - lede

      device:
        description: "设备"
        type: choice
        required: true
        default: all
        options:
          - all
          - xiaomi-ax3600
          - xiaomi-ax9000
          - xiaomi-wr30u
          - xiaomi-ax6000
          - redmi-ax6000
          - phicomm-k2p
          - xiaomi-3g
          - xiaomi-cr660x
          - r2s
          - x86_64
          - raspberrypi-4b

  schedule:
    - cron: "0 20 * * 0"

permissions:
  contents: write

env:
  TZ: Asia/Shanghai
  CCACHE_DIR: ~/.ccache
  CCACHE_COMPRESS: "true"
  CCACHE_COMPRESSLEVEL: "6"
  CCACHE_MAXSIZE: 10G

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.out.outputs.matrix }}
      repo: ${{ steps.out.outputs.repo }}
      upstream: ${{ steps.out.outputs.upstream }}

    steps:
      - uses: actions/checkout@v5
      - id: out
        run: |
          REPO="${{ github.event.inputs.source }}"
          if [ -z "$REPO" ]; then
            REPO="immortalwrt"
          fi

          echo "repo=$REPO" >> $GITHUB_OUTPUT

          if [ "$REPO" = "lede" ]; then
            echo "upstream=coolsnowwolf/lede" >> $GITHUB_OUTPUT
          else
            echo "upstream=immortalwrt/immortalwrt" >> $GITHUB_OUTPUT
          fi

          DEVICE="${{ github.event.inputs.device }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "$DEVICE" ] && [ "$DEVICE" != "all" ]; then
            bash scripts/device-matrix.sh "$DEVICE" >> $GITHUB_OUTPUT
          else
            bash scripts/device-matrix.sh all >> $GITHUB_OUTPUT
          fi

  build:
    needs: setup
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}

    name: ${{ needs.setup.outputs.repo }} ${{ matrix.device }}

    steps:
      - name: Checkout builder config
        uses: actions/checkout@v5

      - name: Checkout source
        uses: actions/checkout@v5
        with:
          repository: ${{ needs.setup.outputs.upstream }}
          ref: master
          path: src
          fetch-depth: 1

      - name: Resolve cache platform
        id: cache
        run: |
          echo "platform=$(bash scripts/cache-platform.sh configs/${{ needs.setup.outputs.repo }}/${{ matrix.device }}.config)" >> $GITHUB_OUTPUT

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android
          sudo docker image prune -af
          df -h

      - name: Cache downloads (dl)
        uses: actions/cache@v5
        with:
          path: src/dl
          key: dl-${{ needs.setup.outputs.repo }}-v4-${{ hashFiles('configs/**', 'scripts/setup-custom-packages.sh', 'scripts/patch-feeds.sh', 'scripts/verify-setup.sh') }}
          restore-keys: |
            dl-${{ needs.setup.outputs.repo }}-

      - name: Cache feeds
        uses: actions/cache@v5
        with:
          path: src/feeds
          key: feeds-${{ needs.setup.outputs.repo }}-v4-${{ hashFiles('configs/**', 'scripts/setup-custom-packages.sh', 'scripts/patch-feeds.sh', 'scripts/verify-setup.sh') }}
          restore-keys: |
            feeds-${{ needs.setup.outputs.repo }}-

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: ~/.ccache
          key: ccache-${{ needs.setup.outputs.repo }}-${{ steps.cache.outputs.platform }}-${{ hashFiles('configs/**', 'configs/custom-plugins.config') }}
          restore-keys: |
            ccache-${{ needs.setup.outputs.repo }}-${{ steps.cache.outputs.platform }}-
            ccache-${{ needs.setup.outputs.repo }}-

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gettext \
            git libssl-dev libelf-dev python3 python3-dev python3-distutils \
            rsync unzip zlib1g-dev file wget subversion patch upx-ucl ccache \
            ecj fastjar java-propose-classpath libncurses5-dev libncursesw5-dev \
            libz-dev curl cmake jq rename tar

      - name: Setup feeds and custom packages
        working-directory: src
        run: bash ${{ github.workspace }}/scripts/setup-custom-packages.sh . append ${{ github.workspace }}/configs

      - name: Prepare firmware overlay
        run: |
          bash ${{ github.workspace }}/scripts/generate-banner.sh ${{ needs.setup.outputs.repo }} ${{ github.workspace }}/files
          bash ${{ github.workspace }}/scripts/bundle-oh-my-bash.sh ${{ github.workspace }}/files

      - name: Copy custom files
        run: bash ${{ github.workspace }}/scripts/install-files-overlay.sh src ${{ github.workspace }}/files
        working-directory: ${{ github.workspace }}

      - name: Generate .config
        run: |
          REPO="${{ needs.setup.outputs.repo }}"
          DEVICE="${{ matrix.device }}"
          COMMON="${{ github.workspace }}/configs/${REPO}/common.config"
          DEVICE_CFG="${{ github.workspace }}/configs/${REPO}/${DEVICE}.config"

          if [ ! -f "$DEVICE_CFG" ]; then
            echo "ERROR: missing config $DEVICE_CFG"
            exit 1
          fi

          cd src
          if [ -f "$COMMON" ]; then
            cat "$COMMON" > .config
            cat "$DEVICE_CFG" >> .config
          else
            cat "$DEVICE_CFG" > .config
          fi
          cat "${{ github.workspace }}/configs/custom-plugins.config" >> .config
          cat "${{ github.workspace }}/configs/snippets/no-rust-passwall.config" >> .config
          cat "${{ github.workspace }}/configs/snippets/no-selinux.config" >> .config

          echo "CONFIG_DEVEL=y" >> .config
          echo "CONFIG_CCACHE=y" >> .config
          bash ${{ github.workspace }}/scripts/verify-defconfig.sh "$(pwd)"

      - name: Build firmware
        run: |
          bash ${{ github.workspace }}/scripts/ci-compile.sh src 1

      - name: Pack artifacts
        run: |
          cd src
          bash ${{ github.workspace }}/scripts/pack-firmware.sh \
            "${{ matrix.device }}" \
            "${{ needs.setup.outputs.repo }}" \
            "${{ github.workspace }}/configs/${{ needs.setup.outputs.repo }}/${{ matrix.device }}.config" \
            "bin/targets" \
            "../release/${{ matrix.device }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: ${{ needs.setup.outputs.repo }}-${{ matrix.device }}
          path: release/${{ matrix.device }}
          retention-days: 7

      - name: Release
        if: success() && github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: Jas0n0ss-${{ needs.setup.outputs.repo }}-${{ matrix.device }}-${{ github.run_number }}
          name: "Jas0n0ss OpenWrt (${{ needs.setup.outputs.repo }}) — ${{ matrix.device }} (#${{ github.run_number }})"
          body: |
            ## Jas0n0ss OpenWrt

            - **Source tree**: `${{ needs.setup.outputs.repo }}`
            - **Device**: `${{ matrix.device }}`
            - **Firmware repo**: https://github.com/Jas0n0ss/openwrt-lede-builder
          files: release/${{ matrix.device }}/Jas0n0ss-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
