name: Build OpenWrt Firmware with ImageBuilder

on:
  workflow_dispatch:
    inputs:
      device:
        description: '选择设备'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - x86_64
          - rockchip-armv8
          - ramips-mt7621
  schedule:
    - cron: '0 20 * * 0'

jobs:
  build:
    strategy:
      matrix:
        include:
          - { target: "x86_64", profile: "generic", builder_tag: "x86_64-latest" }
          - { target: "rockchip-armv8", profile: "friendlyarm_nanopi-r2s", builder_tag: "rockchip-armv8-latest" }
          - { target: "ramips-mt7621", profile: "xiaomi_mi-router-cr660x", builder_tag: "ramips-mt7621-latest" }
    runs-on: ubuntu-latest
    name: Build ${{ matrix.profile }}
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'

    steps:
      - name: Checkout custom files
        uses: actions/checkout@v4

      - name: Skip non-x86_64 on push
        if: github.event_name == 'push' && matrix.target != 'x86_64'
        run: |
          echo "Push event: skipping matrix.target=${{ matrix.target }}"
          exit 0

      - name: Build Firmware with ImageBuilder
        run: |
          # 创建输出目录
          mkdir -p ./bin
          
          # 运行 Docker 容器构建固件
          docker run --rm \
            -v ${{ github.workspace }}/files:/files \
            -v ${{ github.workspace }}/bin:/home/builder/bin \
            openwrt/imagebuilder:${{ matrix.builder_tag }} \
            make image \
              PROFILE="${{ matrix.profile }}" \
              PACKAGES="luci luci-ssl luci-i18n-base-zh-cn luci-i18n-firewall-zh-cn luci-app-passwall luci-app-passwall_Including_Hysteria luci-app-passwall_Including_V2ray luci-app-passwall_Including_Xray luci-app-mosdns luci-app-turboacc luci-app-ttyd luci-theme-aurora luci-app-arpbind" \
              FILES="/files"
          
          echo "构建完成，查看生成的文件："
          ls -la ./bin/

      - name: Rename and organize firmware files
        run: |
          # 查找生成的固件文件
          find ./bin -type f \( -name "*.img.gz" -o -name "*.bin" -o -name "*.vmdk" -o -name "*.qcow2" \) | while read file; do
            dir=$(dirname "$file")
            filename=$(basename "$file")
            # 重命名文件，添加 profile 信息
            newname=$(echo "$filename" | sed "s/-squashfs-/-${{ matrix.profile }}-squashfs-/")
            mv "$file" "$dir/$newname"
            echo "重命名: $filename -> $newname"
          done
          
          # 显示所有固件文件
          echo "=== 生成的固件文件 ==="
          find ./bin -type f \( -name "*.img.gz" -o -name "*.bin" -o -name "*.vmdk" -o -name "*.qcow2" \) -exec ls -lh {} \;

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-${{ matrix.profile }}
          path: |
            ./bin/**/*.img.gz
            ./bin/**/*.bin
            ./bin/**/*.vmdk
            ./bin/**/*.qcow2
          retention-days: 7