name: Build LEDE Optimized Firmware

on:
  workflow_dispatch:
    inputs:
      device:
        description: '设备'
        required: true
        default: 'all'
        type: choice
        options: ['all', 'x86_64', 'rockchip-armv8', 'ramips-mt7621']
  schedule:
    - cron: '0 20 * * 0'
  push:
    branches: [main]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        device: ${{ fromJSON(github.event.inputs.device == 'all' && '["x86_64", "rockchip-armv8", "ramips-mt7621"]' || format('["{0}"]', github.event.inputs.device)) }}
    runs-on: ubuntu-22.04
    name: Build LEDE for ${{ matrix.device }}

    steps:
      # 1. 环境初始化
      - name: Space cleanup and setup dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E rm -rf /usr/share/dotnet /etc/mysql /etc/php /etc/apt/sources.list.d /usr/local/lib/android
          sudo -E apt-mark hold grub-efi-amd64-signed
          sudo -E apt update
          sudo -E apt -y install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib gettext genisoimage git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool llvm lrzsz msmtp ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
          sudo -E apt -y autoremove --purge
          sudo -E apt clean
          sudo -E timedatectl set-timezone "Asia/Shanghai"

      - name: Checkout LEDE source
        uses: actions/checkout@v4
        with:
          repository: coolsnowwolf/lede
          path: lede
          ref: master

      # 2. 配置 feeds 和添加插件
      - name: Configure feeds and add packages
        run: |
          cd lede
          sed -i '1i src-git passwall_packages https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git;main' feeds.conf.default
          sed -i '2i src-git passwall_luci https://github.com/Openwrt-Passwall/openwrt-passwall.git;main' feeds.conf.default
          sed -i '3i src-git kenzo https://github.com/kenzok8/openwrt-packages.git' feeds.conf.default
          sed -i '4i src-git small https://github.com/kenzok8/small.git' feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          git clone --depth 1 https://github.com/sbwml/luci-app-mosdns.git package/mosdns
          git clone --depth 1 https://github.com/chenmozhijin/luci-app-turboacc.git package/turboacc
          git clone --depth 1 https://github.com/tsl0922/ttyd.git package/ttyd
          git clone --depth 1 https://github.com/eamonxg/luci-theme-aurora.git package/aurora

      # 3. 生成 .config
      - name: Generate .config
        run: |
          cd lede
          cp ../configs/common.config .config
          cat ../configs/${{ matrix.device }}.config >> .config
          echo "CONFIG_CCACHE=y" >> .config
          sed -i 's/192.168.1.1/10.10.10.1/g' package/base-files/files/bin/config_generate
          echo "CONFIG_PACKAGE_luci-app-passwall=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-mosdns=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-turboacc=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-ttyd=y" >> .config
          echo "CONFIG_PACKAGE_luci-theme-aurora=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-arpbind=y" >> .config
          echo "# CONFIG_PACKAGE_vlmcsd is not set" >> .config
          make defconfig

      # 4. 下载源码
      - name: Download sources
        run: |
          cd lede
          make download -j16

      # 5. 编译固件
      - name: Compile firmware
        run: |
          cd lede
          echo "开始编译 ${{ matrix.device }}: $(date)"
          make -j$(nproc) || make -j1 V=s
          echo "编译完成: $(date)"

      # 6. 整理产物
      - name: Prepare artifacts
        run: |
          cd lede
          mkdir -p ../release/${{ matrix.device }}
          # 只复制固件文件
          find bin/targets/ -type f \( -name "*.img.gz" -o -name "*.bin" -o -name "*.vmdk" -o -name "*.qcow2" \) -exec cp {} ../release/${{ matrix.device }} \;
          cd ../release/${{ matrix.device }}
          sha256sum *.{img.gz,bin,vmdk,qcow2} 2>/dev/null > sha256sums.txt
          echo "=== 生成的固件 ==="
          ls -lh

      # 7. 上传到 Actions Artifacts（保留所有文件用于调试）
      - name: Upload firmware to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lede-firmware-${{ matrix.device }}
          path: release/${{ matrix.device }}
          retention-days: 7

      # 8. 发布到 Release（只发布固件，不包含配置文件）
      - name: Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: LEDE-${{ matrix.device }}-${{ github.run_number }}
          name: "LEDE Build for ${{ matrix.device }} - ${{ github.run_number }}"
          body: |
            ## LEDE 固件自动构建
            
            - **设备**: ${{ matrix.device }}
            - **管理地址**: http://10.10.10.1
            - **用户名**: root | **密码**: password
            - **包含插件**: PassWall, MosDNS, TurboACC, TTYD, Aurora主题, ARP绑定
            
            ## 固件文件
            - `*.img.gz` - 适用于 R2S 和 X86 的压缩固件
            - `*.bin` - 适用于 CR660x 的固件
            - `*.vmdk` / `*.qcow2` - 适用于虚拟机的磁盘镜像
            
            ## 安装说明
            - **R2S**: 解压 `.img.gz` 后写入 TF 卡
            - **CR660x**: 通过 breed 刷入 `.bin` 文件
            - **X86_64**: 写入硬盘或虚拟机直接使用
          files: |
            release/${{ matrix.device }}/*.img.gz
            release/${{ matrix.device }}/*.bin
            release/${{ matrix.device }}/*.vmdk
            release/${{ matrix.device }}/*.qcow2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}