name: Build LEDE Firmware

on:
  workflow_dispatch:
    inputs:
      device:
        description: '设备'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - r2s
          - cr660x
          - x86
  schedule:
    - cron: '0 20 * * 0'
  push:
    branches: [main]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        device: ${{ fromJSON(github.event.inputs.device == 'all' && '["r2s","cr660x","x86"]' || format('["{0}"]', github.event.inputs.device)) }}
    name: Build LEDE for ${{ matrix.device }}

    steps:
      # 1. 检出你的仓库（包含 configs/ 目录）
      - name: Checkout builder config
        uses: actions/checkout@v4

      # 2. 检出 LEDE 源码到 lede 子目录
      - name: Checkout LEDE source
        uses: actions/checkout@v4
        with:
          repository: coolsnowwolf/lede
          path: lede
          ref: master

      # 3. 安装编译依赖
      - name: Setup dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
            gettext git libssl-dev libelf-dev python3-distutils python3-dev \
            rsync unzip zlib1g-dev file wget subversion patch upx-ucl \
            ccache ecj fastjar jarwrapper java-propose-classpath libz-dev \
            libncurses5-dev libncursesw5-dev
          sudo timedatectl set-timezone "Asia/Shanghai"

      # 4. 配置 feeds（添加第三方源）
      - name: Configure feeds
        run: |
          cd lede
          # 在 feeds.conf.default 顶部插入第三方源
          sed -i '1i src-git passwall_packages https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git;main' feeds.conf.default
          sed -i '2i src-git passwall_luci https://github.com/Openwrt-Passwall/openwrt-passwall.git;main' feeds.conf.default
          sed -i '3i src-git kenzo https://github.com/kenzok8/openwrt-packages.git' feeds.conf.default
          sed -i '4i src-git small https://github.com/kenzok8/small.git' feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # 5. 克隆额外插件
      - name: Clone additional plugins
        run: |
          cd lede
          git clone --depth 1 https://github.com/sbwml/luci-app-mosdns.git package/mosdns
          git clone --depth 1 https://github.com/chenmozhijin/luci-app-turboacc.git package/turboacc
          git clone --depth 1 https://github.com/tsl0922/ttyd.git package/ttyd
          git clone --depth 1 https://github.com/eamonxg/luci-theme-aurora.git package/aurora

      # 6. 生成 .config 配置文件
      - name: Generate .config
        run: |
          cd lede
          
          # 使用绝对路径读取配置文件（关键修复）
          cp ${{ github.workspace }}/configs/common.config .config
          cat ${{ github.workspace }}/configs/${{ matrix.device }}.config >> .config
          echo "CONFIG_CCACHE=y" >> .config
          
          # 修改默认 IP 为 10.10.10.1
          sed -i 's/192.168.1.1/10.10.10.1/g' package/base-files/files/bin/config_generate
          
          # 启用插件
          echo "CONFIG_PACKAGE_luci-app-passwall=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-passwall_Including_Hysteria=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-passwall_Including_V2ray=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-passwall_Including_Xray=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-mosdns=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-turboacc=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-ttyd=y" >> .config
          echo "CONFIG_PACKAGE_luci-theme-aurora=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-arpbind=y" >> .config
          
          # 禁用问题包
          echo "# CONFIG_PACKAGE_vlmcsd is not set" >> .config
          echo "# CONFIG_PACKAGE_luci-app-vlmcsd is not set" >> .config
          
          # 生成最终配置
          make defconfig

      # 7. 下载源码包
      - name: Download sources
        run: |
          cd lede
          make download -j16

      # 8. 编译固件（自动容错）
      - name: Compile firmware
        run: |
          cd lede
          echo "开始编译 ${{ matrix.device }}: $(date)"
          if make -j$(nproc); then
            echo "编译成功: $(date)"
          else
            echo "并行编译失败，尝试单线程..."
            make -j1 V=s
          fi

      # 9. 整理产物
      - name: Prepare artifacts
        run: |
          cd lede
          mkdir -p ../release/${{ matrix.device }}
          
          # 复制固件文件
          find bin/targets/ -type f \( -name "*.img.gz" -o -name "*.bin" -o -name "*.vmdk" -o -name "*.qcow2" -o -name "*.ext4.gz" -o -name "*.squashfs" -o -name "*.img" \) 2>/dev/null | while read file; do
            filename=$(basename "$file")
            cp "$file" "../release/${{ matrix.device }}/${filename}"
          done
          
          # 生成校验和
          cd ../release/${{ matrix.device }}
          sha256sum *.{img.gz,bin,vmdk,qcow2,img} 2>/dev/null > sha256sums.txt
          
          echo "=== 生成的固件 ==="
          ls -lh

      # 10. 上传到 Actions Artifacts
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lede-${{ matrix.device }}
          path: release/${{ matrix.device }}
          retention-days: 7

      # 11. 发布到 GitHub Release（仅 push 到 main 时触发）
      - name: Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: LEDE-${{ matrix.device }}-${{ github.run_number }}
          name: "LEDE Firmware for ${{ matrix.device }} - Build ${{ github.run_number }}"
          body: |
            ## LEDE 固件自动构建
            
            ### 版本信息
            - **设备**: ${{ matrix.device }}
            - **管理地址**: http://10.10.10.1
            - **用户名**: root
            - **密码**: password
            
            ### 包含插件
            - PassWall (科学上网)
            - MosDNS (DNS转发)
            - TurboACC (网络加速)
            - TTYD (网页终端)
            - Aurora (现代化主题)
            - ARP绑定
            
            ### 安装说明
            | 设备 | 安装方法 |
            |------|----------|
            | R2S | 解压 .img.gz 后写入 TF 卡 |
            | CR660x | 通过 breed 刷入 .bin 文件 |
            | X86 | 写入硬盘或虚拟机直接使用 |
          files: |
            release/${{ matrix.device }}/*.img.gz
            release/${{ matrix.device }}/*.bin
            release/${{ matrix.device }}/*.vmdk
            release/${{ matrix.device }}/*.qcow2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}