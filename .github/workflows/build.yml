name: Build OpenWrt

on:
  workflow_dispatch:
    inputs:
      device:
        description: '设备'
        required: true
        default: 'all'
        type: choice
        options: ['all', 'r2s', 'cr660x', 'x86']
  schedule:
    - cron: '0 20 * * 0'
  push:
    branches: [main]

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        device: ${{ fromJSON(github.event.inputs.device == 'all' && '["r2s","cr660x","x86"]' || format('["{0}"]', github.event.inputs.device)) }}
    
    steps:
    - name: Checkout builder
      uses: actions/checkout@v4
    
    - name: Checkout LEDE
      uses: actions/checkout@v4
      with:
        repository: coolsnowwolf/lede
        path: lede
        ref: master
    
    - name: Cache feeds
      id: cache-feeds
      uses: actions/cache@v3
      with:
        path: |
          lede/dl
          lede/feeds
          ~/.ccache
        key: ${{ runner.os }}-${{ matrix.device }}-${{ github.run_id }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.device }}-
          ${{ runner.os }}-
    
    - name: Setup environment
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk \
          gettext git libssl-dev libelf-dev python3-distutils python3-dev \
          rsync unzip zlib1g-dev file wget subversion patch upx-ucl \
          ccache ecj fastjar jarwrapper java-propose-classpath libz-dev
    
    - name: Configure device
      run: |
        cd lede
        # 检查通用配置
        if [ -f "../configs/common.config" ]; then
          cat ../configs/common.config > .config
        else
          echo "# Base config" > .config
        fi
        
        # 添加设备特定配置
        if [ -f "../configs/${{ matrix.device }}.config" ]; then
          cat ../configs/${{ matrix.device }}.config >> .config
        else
          echo "错误: 设备配置文件 ${{ matrix.device }}.config 不存在"
          exit 1
        fi
        
        make defconfig
    
    - name: Validate config
      run: |
        cd lede
        # 检查关键配置
        if ! grep -q "CONFIG_TARGET_" .config; then
          echo "错误: 配置中没有找到CONFIG_TARGET设置"
          exit 1
        fi
        echo "配置验证通过"
    
    - name: Update feeds
      run: |
        cd lede
        ./scripts/feeds update -a
        ./scripts/feeds install -a
    
    - name: Add plugins
      run: |
        cd lede
        # 克隆插件
        git clone --depth 1 https://github.com/xiaorouji/openwrt-passwall.git package/passwall
        git clone --depth 1 https://github.com/xiaorouji/openwrt-passwall-packages.git package/passwall-packages
        git clone --depth 1 https://github.com/sbwml/luci-app-mosdns.git package/mosdns
        git clone --depth 1 https://github.com/chenmozhijin/luci-app-turboacc.git package/turboacc
        git clone --depth 1 https://github.com/rufengsuixing/luci-app-adbyby-plus.git package/adbyby
        git clone --depth 1 https://github.com/zzsj0928/luci-app-ap-modem.git package/modem
        git clone --depth 1 https://github.com/immortalwrt/luci-app-arpbind.git package/arpbind
        git clone --depth 1 https://github.com/kenzok78/luci-app-broadbandacc.git package/bandacc
        git clone --depth 1 https://github.com/tsl0922/ttyd.git package/ttyd
        git clone --depth 1 https://github.com/ximiTech/luci-app-vlmcsd.git package/vlmcsd
        git clone --depth 1 https://github.com/immortalwrt/luci-app-watchcat.git package/watchcat
        git clone --depth 1 https://github.com/thinktip/luci-theme-aurora.git package/aurora
        
        # 重新安装所有feeds
        ./scripts/feeds install -a
    
    - name: Customize
      run: |
        cd lede
        
        # 修改默认IP
        sed -i 's/192.168.1.1/10.10.10.1/g' package/base-files/files/bin/config_generate
        
        # 复制自定义文件
        if [ -d "../files" ] && [ "$(ls -A ../files 2>/dev/null)" ]; then
          cp -rf ../files/* ./
        fi
        
        # 添加PassWall依赖配置
        echo "CONFIG_PACKAGE_luci-app-passwall=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-passwall_Including_Hysteria=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-passwall_Including_Tuic=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-passwall_Including_SSR=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-passwall_Including_V2ray=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-passwall_Including_Xray=y" >> .config
        
        # 设备特定内核配置
        case "${{ matrix.device }}" in
          r2s)
            echo "CONFIG_PACKAGE_kmod-usb-net-rtl8152=y" >> .config
            echo "CONFIG_PACKAGE_kmod-r8168=y" >> .config
            ;;
          cr660x)
            echo "CONFIG_PACKAGE_kmod-mt7915e=y" >> .config
            echo "CONFIG_PACKAGE_wpad-openssl=y" >> .config
            ;;
          x86)
            echo "CONFIG_PACKAGE_kmod-vmxnet3=y" >> .config
            echo "CONFIG_PACKAGE_kmod-igb=y" >> .config
            echo "CONFIG_PACKAGE_kmod-ixgbe=y" >> .config
            echo "CONFIG_PACKAGE_open-vm-tools=y" >> .config
            ;;
        esac
        
        # 通用优化配置
        echo "CONFIG_STRIP_KERNEL_EXPORTS=y" >> .config
        echo "CONFIG_USE_MUSL=y" >> .config
        echo "CONFIG_USE_SSTRIP=y" >> .config
        
        # 再次生成配置
        make defconfig
    
    - name: Build
      run: |
        cd lede
        make download -j$(nproc)
        echo "开始编译 $(date)"
        make -j$(nproc) V=s || make -j1 V=s
        echo "编译完成 $(date)"
    
    - name: Package artifacts
      run: |
        cd lede
        mkdir -p ../release/${{ matrix.device }}
        # 查找并复制固件
        find bin/targets/ -type f \( -name "*.img.gz" -o -name "*.bin" -o -name "*.vmdk" -o -name "*.qcow2" -o -name "*.ext4.gz" -o -name "*.squashfs" -o -name "*.img" \) -exec cp -v {} ../release/${{ matrix.device }} \;
        
        # 复制配置文件
        cp .config ../release/${{ matrix.device }}/config.build.txt
        
        # 生成校验和
        cd ../release/${{ matrix.device }}
        sha256sum * 2>/dev/null > sha256sums.txt
        
        # 显示固件列表
        echo "=== 生成的固件 ==="
        ls -lh
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: openwrt-${{ matrix.device }}
        path: release/${{ matrix.device }}
        retention-days: 7
    
    - name: Create Release Body
      id: release_body
      run: |
        echo "body<<EOF" >> $GITHUB_OUTPUT
        echo "## 固件信息" >> $GITHUB_OUTPUT
        echo "- **编译时间**: $(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
        echo "- **管理地址**: http://10.10.10.1" >> $GITHUB_OUTPUT
        echo "- **用户名**: root" >> $GITHUB_OUTPUT
        echo "- **密码**: password" >> $GITHUB_OUTPUT
        echo "" >> $GITHUB_OUTPUT
        echo "## 设备" >> $GITHUB_OUTPUT
        echo "- **${{ matrix.device }}**" >> $GITHUB_OUTPUT
        echo "" >> $GITHUB_OUTPUT
        echo "## 包含插件" >> $GITHUB_OUTPUT
        echo "- PassWall (科学上网)" >> $GITHUB_OUTPUT
        echo "- Adbyby Plus (广告过滤)" >> $GITHUB_OUTPUT
        echo "- MosDNS (DNS转发)" >> $GITHUB_OUTPUT
        echo "- TurboACC (网络加速)" >> $GITHUB_OUTPUT
        echo "- TTYD (网页终端)" >> $GITHUB_OUTPUT
        echo "- KMS (激活服务)" >> $GITHUB_OUTPUT
        echo "- Watchcat (看门狗)" >> $GITHUB_OUTPUT
        echo "- Aurora主题" >> $GITHUB_OUTPUT
        echo "" >> $GITHUB_OUTPUT
        echo "## 下载说明" >> $GITHUB_OUTPUT
        echo "- R2S: 写入 TF 卡" >> $GITHUB_OUTPUT
        echo "- CR660x: 通过 breed 刷入" >> $GITHUB_OUTPUT
        echo "- X86: 写入硬盘或虚拟机直接使用" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: nightly-${{ github.run_number }}
        name: OpenWrt Build ${{ github.run_number }}
        body: ${{ steps.release_body.outputs.body }}
        files: |
          release/${{ matrix.device }}/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}