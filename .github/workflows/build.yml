# 唯一维护的固件编译工作流（LEDE + ImmortalWrt）
name: Build OpenWrt Firmware

on:
  workflow_dispatch:
    inputs:
      source:
        description: "源码树 (configs/<source>/)"
        type: choice
        required: true
        default: immortalwrt
        options:
          - immortalwrt
          - lede
      device:
        description: "设备代号 (configs/devices.list)"
        type: choice
        required: true
        default: all
        options:
          - all
          - xiaomi-ax3600
          - xiaomi-ax9000
          - xiaomi-wr30u
          - xiaomi-ax6000
          - redmi-ax6000
          - phicomm-k2p
          - xiaomi-3g
          - xiaomi-cr660x
          - r2s
          - x86_64
          - raspberrypi-4b

  schedule:
    # 定时仅编 ImmortalWrt 全设备；LEDE 请手动选 source=lede
    - cron: "0 20 * * 0"

permissions:
  contents: write

concurrency:
  group: firmware-${{ github.ref_name }}-${{ github.event.inputs.source || 'immortalwrt' }}-${{ github.event.inputs.device || 'all' }}
  cancel-in-progress: true

env:
  TZ: Asia/Shanghai
  CCACHE_DIR: ~/.ccache
  CCACHE_COMPRESS: "true"
  CCACHE_COMPRESSLEVEL: "6"
  CCACHE_MAXSIZE: 10G
  SRC_DIR: src

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
      repo: ${{ steps.resolve.outputs.repo }}
      upstream: ${{ steps.resolve.outputs.upstream }}
    steps:
      - uses: actions/checkout@v5
      - id: resolve
        run: |
          SOURCE="${{ github.event.inputs.source }}"
          DEVICE="${{ github.event.inputs.device }}"
          [ -n "$SOURCE" ] || SOURCE="immortalwrt"
          EVENT="${{ github.event_name }}"

          case "$SOURCE" in
            lede)
              echo "repo=lede" >> "$GITHUB_OUTPUT"
              echo "upstream=coolsnowwolf/lede" >> "$GITHUB_OUTPUT"
              ;;
            immortalwrt)
              echo "repo=immortalwrt" >> "$GITHUB_OUTPUT"
              echo "upstream=immortalwrt/immortalwrt" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "ERROR: unknown source '$SOURCE' (use lede or immortalwrt)" >&2
              exit 1
              ;;
          esac

          LIST="configs/devices.list"
          [ -f "$LIST" ] || { echo "ERROR: missing $LIST" >&2; exit 1; }

          mapfile -t ALL_DEVICES < <(
            sed 's/#.*//' "$LIST" | xargs -n1 echo | sed '/^$/d'
          )
          if [ "$EVENT" = "workflow_dispatch" ] && [ -n "$DEVICE" ] && [ "$DEVICE" != "all" ]; then
            selected=0
            for d in "${ALL_DEVICES[@]}"; do
              if [ "$d" = "$DEVICE" ]; then
                selected=1
                break
              fi
            done
            [ "$selected" -eq 1 ] || {
              echo "ERROR: unknown device '${DEVICE}'" >&2
              exit 1
            }
            echo "matrix={\"device\":[\"${DEVICE}\"]}" >> "$GITHUB_OUTPUT"
            CHECK_DEVICES=("$DEVICE")
          else
            json=$(printf '"%s",' "${ALL_DEVICES[@]}" | sed 's/,$//')
            echo "matrix={\"device\":[${json}]}" >> "$GITHUB_OUTPUT"
            CHECK_DEVICES=("${ALL_DEVICES[@]}")
          fi

          for dev in "${CHECK_DEVICES[@]}"; do
            cfg="configs/${SOURCE}/${dev}.config"
            [ -f "$cfg" ] || { echo "ERROR: missing $cfg" >&2; exit 1; }
          done

          # Policy validation: TurboACC/dnsmasq-full/nftables-json must not be enabled in base configs
          policy_fail=0
          for repo in lede immortalwrt; do
            for cfg in "configs/${repo}/common.config" configs/${repo}/*.config; do
              [ -f "$cfg" ] || continue
              if grep -qE '^CONFIG_PACKAGE_dnsmasq-full=y|^CONFIG_PACKAGE_dnsmasq_full_.*=y|^CONFIG_PACKAGE_nftables-json=y|^CONFIG_PACKAGE_nftables-nojson=y|^CONFIG_PACKAGE_luci-app-turboacc=y|^CONFIG_PACKAGE_kmod-nft-fullcone=y|^CONFIG_PACKAGE_luci-app-turboacc_INCLUDE_OFFLOADING=y' "$cfg"; then
                echo "ERROR: forbidden policy symbol in $cfg" >&2
                policy_fail=1
              fi
            done
          done
          [ "$policy_fail" -eq 0 ] || exit 1

          # Device package validation (selected source only)
          for dev in "${CHECK_DEVICES[@]}"; do
            cfg="configs/${SOURCE}/${dev}.config"
            grep -q '^CONFIG_TARGET_.*_DEVICE_.*=y' "$cfg" || {
              echo "ERROR: $cfg missing CONFIG_TARGET_*_DEVICE_*=y" >&2
              exit 1
            }
            grep -q '^CONFIG_PACKAGE_wpad-openssl=y' "$cfg" || {
              echo "ERROR: $cfg missing CONFIG_PACKAGE_wpad-openssl=y" >&2
              exit 1
            }
            if grep -qE '^CONFIG_PACKAGE_dnsmasq-full=y|^CONFIG_PACKAGE_nftables-json=y|^CONFIG_PACKAGE_luci-app-turboacc=y|^CONFIG_PACKAGE_kmod-nft-fullcone=y' "$cfg"; then
              echo "ERROR: $cfg contains forbidden pre-enable package symbol" >&2
              exit 1
            fi
          done

  build:
    needs: setup
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    name: ${{ needs.setup.outputs.repo }} · ${{ matrix.device }}

    env:
      REPO: ${{ needs.setup.outputs.repo }}
      UPSTREAM: ${{ needs.setup.outputs.upstream }}

    steps:
      - uses: actions/checkout@v5

      - name: Checkout ${{ env.REPO }} source
        uses: actions/checkout@v5
        with:
          repository: ${{ env.UPSTREAM }}
          ref: master
          path: ${{ env.SRC_DIR }}
          fetch-depth: 1

      - name: Resolve cache platform
        id: cache
        run: |
          cfg="configs/${REPO}/${{ matrix.device }}.config"
          if line=$(grep -E '^CONFIG_TARGET_.*_DEVICE_.*=y' "$cfg" 2>/dev/null | head -1); then
            platform=$(echo "$line" | sed -E 's/^CONFIG_TARGET_(.*)_DEVICE_.*/\1/' | tr '_' '-')
          elif grep -q '^CONFIG_TARGET_x86_64=y' "$cfg" 2>/dev/null; then
            platform="x86-64"
          else
            targets=()
            while IFS= read -r t; do
              targets+=("$t")
            done < <(
              grep -E '^CONFIG_TARGET_[A-Za-z0-9_]+=y' "$cfg" \
                | grep -v '_DEVICE_' | grep -v 'ROOTFS' | grep -v 'KERNEL' | grep -v 'IMAGES' \
                | sed -E 's/^CONFIG_TARGET_(.*)=y/\1/' | tr '_' '-' || true
            )
            if [ "${#targets[@]}" -gt 0 ]; then
              platform=$(IFS=-; echo "${targets[*]}")
            else
              platform="unknown"
            fi
          fi
          platform=$(echo "$platform" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g; s/--*/-/g')
          echo "platform=${platform}" >> "$GITHUB_OUTPUT"

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android
          sudo docker image prune -af
          df -h

      - name: Cache dl
        uses: actions/cache@v5
        with:
          path: ${{ env.SRC_DIR }}/dl
          key: dl-${{ env.REPO }}-kconfig-fix-v7-${{ hashFiles('configs/**', '.github/workflows/build.yml', 'scripts/setup-custom-packages.sh') }}
          restore-keys: dl-${{ env.REPO }}-

      - name: Cache feeds
        uses: actions/cache@v5
        with:
          path: ${{ env.SRC_DIR }}/feeds
          key: feeds-${{ env.REPO }}-kconfig-fix-v7-${{ hashFiles('configs/**', '.github/workflows/build.yml', 'scripts/setup-custom-packages.sh') }}
          restore-keys: feeds-${{ env.REPO }}-

      - name: Scrub cached feeds before setup (inline CI fix)
        working-directory: ${{ env.SRC_DIR }}
        run: |
          set -euo pipefail
          sed -i '\|kenzok8/openwrt-packages|d; \|kenzok8/small|d' feeds.conf.default 2>/dev/null || true
          sed -i '\|kenzok8/openwrt-packages|d; \|kenzok8/small|d' feeds.conf 2>/dev/null || true
          rm -rf feeds/small feeds/kenzo package/feeds/small package/feeds/kenzo 2>/dev/null || true

          while IFS= read -r mk; do
            [ -n "$mk" ] || continue
            case "$mk" in ./dl/*|./build_dir/*|./staging_dir/*) continue ;; esac
            rm -rf "$(dirname "$mk")"
          done < <(grep -RIlE 'PKG_NAME:=(nftables-json|nftables-nojson)' . 2>/dev/null || true)

          dnsmk="package/network/services/dnsmasq/Makefile"
          if [ -f "$dnsmk" ]; then
            sed -i 's/+PACKAGE_dnsmasq_full_nftset:nftables-json//' "$dnsmk"
          fi

          keep_luci=""
          keep_kmod=""
          [ -f package/luci-app-turboacc/Makefile ] && keep_luci="$(cd package/luci-app-turboacc && pwd)"
          [ -f package/nft-fullcone/Makefile ] && keep_kmod="$(cd package/nft-fullcone && pwd)"

          remove_dup_dir() {
            local dir="$1" keep="$2"
            [ -n "$dir" ] || return 0
            [ -d "$dir" ] || return 0
            case "$dir" in
              package/luci-app-turboacc|./package/luci-app-turboacc|package/nft-fullcone|./package/nft-fullcone) return 0 ;;
            esac
            local abs
            abs="$(cd "$dir" && pwd)"
            [ -n "$keep" ] && [ "$abs" = "$keep" ] && return 0
            rm -rf "$dir"
          }

          while IFS= read -r mk; do
            [ -n "$mk" ] || continue
            case "$mk" in ./dl/*|./build_dir/*|./staging_dir/*|./.ci-stash-turboacc/*) continue ;; esac
            remove_dup_dir "$(dirname "$mk")" "$keep_luci"
          done < <(grep -RIl --include='Makefile' 'PKG_NAME:=luci-app-turboacc' feeds package/feeds package/lean 2>/dev/null || true)

          while IFS= read -r mk; do
            [ -n "$mk" ] || continue
            case "$mk" in ./dl/*|./build_dir/*|./staging_dir/*|./.ci-stash-turboacc/*|./package/nft-fullcone/Makefile) continue ;; esac
            remove_dup_dir "$(dirname "$mk")" "$keep_kmod"
          done < <(grep -RIlE --include='Makefile' 'PKG_NAME:=nft-fullcone|PKG_NAME:=kmod-nft-fullcone|KernelPackage/nft-fullcone' feeds package/feeds package/lean package 2>/dev/null || true)

          rm -rf feeds/luci/applications/luci-app-turboacc feeds/luci/applications/luci-app-turboacc-chenmozhijin 2>/dev/null || true

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: ~/.ccache
          key: ccache-${{ env.REPO }}-${{ steps.cache.outputs.platform }}-${{ hashFiles('configs/**/common.config', 'configs/custom-plugins.config') }}
          restore-keys: |
            ccache-${{ env.REPO }}-${{ steps.cache.outputs.platform }}-
            ccache-${{ env.REPO }}-

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gettext \
            git libssl-dev libelf-dev python3 python3-dev python3-distutils \
            rsync unzip zlib1g-dev file wget subversion patch upx-ucl ccache \
            ecj fastjar java-propose-classpath libncurses5-dev libncursesw5-dev \
            libz-dev curl cmake jq rename tar

      - name: Setup feeds and packages
        working-directory: ${{ env.SRC_DIR }}
        run: bash ${{ github.workspace }}/scripts/setup-custom-packages.sh . append ${{ github.workspace }}/configs

      - name: Scrub feeds after setup (inline CI fix)
        working-directory: ${{ env.SRC_DIR }}
        run: |
          set -euo pipefail
          sed -i '\|kenzok8/openwrt-packages|d; \|kenzok8/small|d' feeds.conf.default 2>/dev/null || true
          sed -i '\|kenzok8/openwrt-packages|d; \|kenzok8/small|d' feeds.conf 2>/dev/null || true
          rm -rf feeds/small feeds/kenzo package/feeds/small package/feeds/kenzo 2>/dev/null || true
          while IFS= read -r mk; do
            [ -n "$mk" ] || continue
            case "$mk" in ./dl/*|./build_dir/*|./staging_dir/*) continue ;; esac
            rm -rf "$(dirname "$mk")"
          done < <(grep -RIlE 'PKG_NAME:=(nftables-json|nftables-nojson)' . 2>/dev/null || true)
          rm -rf feeds/luci/applications/luci-app-turboacc feeds/luci/applications/luci-app-turboacc-chenmozhijin 2>/dev/null || true

      - name: Prepare firmware overlay
        working-directory: ${{ github.workspace }}
        run: |
          bash scripts/generate-banner.sh "${REPO}" files
          bash scripts/bundle-oh-my-bash.sh files
          bash scripts/install-files-overlay.sh "${{ env.SRC_DIR }}" files

      - name: Generate .config
        working-directory: ${{ env.SRC_DIR }}
        run: |
          set -euo pipefail
          device_cfg="${{ github.workspace }}/configs/${REPO}/${{ matrix.device }}.config"
          common_cfg="${{ github.workspace }}/configs/${REPO}/common.config"
          custom_cfg="${{ github.workspace }}/configs/custom-plugins.config"
          for f in "$device_cfg" "$common_cfg" "$custom_cfg"; do
            [ -f "$f" ] || { echo "ERROR: missing ${f}" >&2; exit 1; }
          done
          cat "$device_cfg" > .config
          cat "$common_cfg" >> .config
          cat "$custom_cfg" >> .config
          for snip in \
            "${{ github.workspace }}/configs/snippets/wireless-core.config" \
            "${{ github.workspace }}/configs/snippets/luci-zh-cn.config" \
            "${{ github.workspace }}/configs/snippets/no-rust-passwall.config" \
            "${{ github.workspace }}/configs/snippets/no-selinux.config"; do
            [ -f "$snip" ] && cat "$snip" >> .config
          done
          echo "CONFIG_DEVEL=y" >> .config
          echo "CONFIG_CCACHE=y" >> .config
          sed -i \
            -e '/^CONFIG_PACKAGE_dnsmasq-full=y$/d' \
            -e '/^CONFIG_PACKAGE_dnsmasq_full_/d' \
            -e '/^CONFIG_PACKAGE_nftables-json=y$/d' \
            -e '/^CONFIG_PACKAGE_nftables-nojson=y$/d' \
            -e '/^CONFIG_PACKAGE_luci-app-turboacc/d' \
            -e '/^CONFIG_PACKAGE_kmod-nft-fullcone=y$/d' \
            -e '/^CONFIG_PACKAGE_kmod-nft-offload=y$/d' \
            -e '/^CONFIG_PACKAGE_kmod-tcp-bbr=y$/d' \
            .config
          sed -i \
            -e '/^# CONFIG_PACKAGE_dnsmasq-full is not set$/d' \
            -e '/^# CONFIG_PACKAGE_dnsmasq_full_/d' \
            -e '/^# CONFIG_PACKAGE_nftables-json is not set$/d' \
            -e '/^# CONFIG_PACKAGE_nftables-nojson is not set$/d' \
            -e '/^# CONFIG_PACKAGE_luci-app-turboacc/d' \
            -e '/^CONFIG_PACKAGE_luci-app-turboacc_INCLUDE_/d' \
            .config
          {
            echo
            echo "# --- Kconfig cycle guards (dnsmasq / duplicate nftables only) ---"
            echo "# CONFIG_PACKAGE_dnsmasq-full is not set"
            echo "# CONFIG_PACKAGE_dnsmasq_full_nftset is not set"
            echo "# CONFIG_PACKAGE_dnsmasq_full_dhcp is not set"
            echo "# CONFIG_PACKAGE_nftables-json is not set"
            echo "# CONFIG_PACKAGE_nftables-nojson is not set"
          } >> .config
          echo "==> .config merged and sanitized: ${REPO}/${{ matrix.device }}"

      - name: Defconfig and TurboACC (inline CI fix)
        working-directory: ${{ env.SRC_DIR }}
        run: |
          set -euo pipefail
          STASH=".ci-stash-turboacc"
          restored=0
          cleanup() {
            if [ "$restored" -eq 0 ]; then
              for d in luci-app-turboacc nft-fullcone; do
                [ -d "${STASH}/${d}" ] || continue
                rm -rf "package/${d}"
                mv "${STASH}/${d}" "package/${d}"
              done
            fi
          }
          trap cleanup EXIT

          mkdir -p "$STASH"
          for d in luci-app-turboacc nft-fullcone; do
            if [ -d "package/${d}" ]; then
              rm -rf "${STASH}/${d}"
              mv "package/${d}" "${STASH}/${d}"
            fi
          done

          make defconfig > defconfig.log 2>&1 || { cat defconfig.log; exit 1; }
          cat defconfig.log
          if grep -q 'recursive dependency detected' defconfig.log; then
            echo "ERROR: recursive dependency detected during base defconfig" >&2
            exit 1
          fi

          for d in luci-app-turboacc nft-fullcone; do
            [ -d "${STASH}/${d}" ] || continue
            rm -rf "package/${d}"
            mv "${STASH}/${d}" "package/${d}"
          done
          restored=1

          [ -f package/luci-app-turboacc/Makefile ] || { echo "ERROR: missing package/luci-app-turboacc/Makefile" >&2; exit 1; }
          [ -f package/nft-fullcone/Makefile ] || { echo "ERROR: missing package/nft-fullcone/Makefile" >&2; exit 1; }

          if ! grep -q 'ci-patched-turboacc-defaults' package/luci-app-turboacc/Makefile; then
            sed -i \
              -e '/INCLUDE_OFFLOADING/,/^config /{ s/^[[:space:]]*default y if.*/	default n # ci-patched-turboacc-defaults/; }' \
              -e '/INCLUDE_NFT_FULLCONE/,/^config /{ s/^[[:space:]]*default y[[:space:]]*$/	default n # ci-patched-turboacc-defaults/; }' \
              -e '/INCLUDE_BBR_CCA/,/^config /{ s/^[[:space:]]*default y[[:space:]]*$/	default n # ci-patched-turboacc-defaults/; }' \
              package/luci-app-turboacc/Makefile
          fi

          cat "${{ github.workspace }}/configs/snippets/turboacc.config" >> .config
          # Do not use ./scripts/config here: some upstream trees have scripts/config as a directory.
          sed -i \
            -e '/^CONFIG_PACKAGE_luci-app-turboacc.*/d' \
            -e '/^CONFIG_PACKAGE_kmod-nft-fullcone=y$/d' \
            -e '/^CONFIG_PACKAGE_kmod-tcp-bbr=y$/d' \
            -e '/^CONFIG_PACKAGE_kmod-nft-offload=y$/d' \
            -e '/^# CONFIG_PACKAGE_luci-app-turboacc_INCLUDE_OFFLOADING is not set$/d' \
            .config
          {
            echo "CONFIG_PACKAGE_kmod-nft-fullcone=y"
            echo "CONFIG_PACKAGE_kmod-tcp-bbr=y"
            echo "CONFIG_PACKAGE_luci-app-turboacc=y"
            echo "CONFIG_PACKAGE_luci-app-turboacc_INCLUDE_BBR_CCA=y"
            echo "CONFIG_PACKAGE_luci-app-turboacc_INCLUDE_NFT_FULLCONE=y"
            echo "# CONFIG_PACKAGE_luci-app-turboacc_INCLUDE_OFFLOADING is not set"
          } >> .config

          make oldconfig > turboacc-oldconfig.log 2>&1 || { cat turboacc-oldconfig.log; exit 1; }
          cat turboacc-oldconfig.log
          if grep -q 'recursive dependency detected' turboacc-oldconfig.log; then
            echo "ERROR: recursive dependency detected after TurboACC enable" >&2
            exit 1
          fi

      - name: Compile firmware
        working-directory: ${{ env.SRC_DIR }}
        run: |
          set -euo pipefail
          TOOLCHAIN=""
          [ "${REPO}" = "immortalwrt" ] && TOOLCHAIN=1
          echo "Build ${REPO} ${{ matrix.device }} (platform=${{ steps.cache.outputs.platform }})"
          [ -f .config ] || { echo "ERROR: .config missing" >&2; exit 1; }
          export PATH="/usr/lib/ccache:${PATH:-}"
          ulimit -n 65535 || true
          ccache -s 2>/dev/null || true
          make download -j16 || make download -j8
          if [ "$TOOLCHAIN" = "1" ]; then
            make toolchain/compile -j"$(nproc)" || make toolchain/compile -j1 V=s
          fi
          if ! make -j"$(nproc)"; then
            echo "==> Parallel build failed, retrying -j1 V=s..."
            make -j1 V=s
          fi
          ccache -s 2>/dev/null || true
          echo "==> compile: OK"

      - name: Pack firmware
        working-directory: ${{ env.SRC_DIR }}
        run: |
          bash ${{ github.workspace }}/scripts/pack-firmware.sh \
            "${{ matrix.device }}" "${REPO}" \
            "${{ github.workspace }}/configs/${REPO}/${{ matrix.device }}.config" \
            bin/targets "../release/${{ matrix.device }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ env.REPO }}-${{ matrix.device }}
          path: release/${{ matrix.device }}
          retention-days: 7

      - name: Upload debug logs on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: debug-${{ env.REPO }}-${{ matrix.device }}
          path: |
            ${{ env.SRC_DIR }}/defconfig.log
            ${{ env.SRC_DIR }}/turboacc-oldconfig.log
            ${{ env.SRC_DIR }}/.config
            ${{ env.SRC_DIR }}/.config.old
          if-no-files-found: ignore
          retention-days: 3

      - name: Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: Jas0n0ss-${{ env.REPO }}-${{ matrix.device }}-${{ github.run_number }}
          name: "Jas0n0ss ${{ env.REPO }} — ${{ matrix.device }} (#${{ github.run_number }})"
          body: |
            ## Jas0n0ss OpenWrt (${{ env.REPO }})

            | 项 | 值 |
            |----|-----|
            | 源码 | `${{ env.UPSTREAM }}` |
            | 设备 | `${{ matrix.device }}` |
            | 命名 | `Jas0n0ss-${{ env.REPO }}-<代号>-<设备>-<平台>-<类型>.<后缀>` |
            | 管理 | http://10.10.10.1 · `root` / `password` |
            | 配置仓 | https://github.com/Jas0n0ss/openwrt-lede-builder |
          files: release/${{ matrix.device }}/Jas0n0ss-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
