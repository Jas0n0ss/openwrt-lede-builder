name: OpenWrt-CI

on:
  workflow_dispatch:
    inputs:
      device:
        description: '设备'
        required: true
        default: 'all'
        type: choice
        options: ['all', 'r2s', 'cr660x', 'x86']
  schedule:
    - cron: 0 20 * * *
  push:
    branches: [ "main" ]

permissions:
  contents: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build_openwrt:
    name: Build OpenWrt Firmware
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        device: ${{ fromJSON(github.event.inputs.device == 'all' && '["r2s","cr660x","x86"]' || format('["{0}"]', github.event.inputs.device)) }}

    steps:
      - name: Building for ${{ matrix.device }}
        run: echo "Building firmware for ${{ matrix.device }}"
      # ----- 1. 环境准备与空间清理 (KFERMercer 风格) -----
      - name: Space cleanup and Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker image prune -f
          sudo -E rm -rf /usr/share/dotnet /etc/mysql /etc/php /etc/apt/sources.list.d /usr/local/lib/android
          sudo -E apt-mark hold grub-efi-amd64-signed
          sudo -E apt update
          sudo -E apt -y upgrade
          sudo -E apt -y install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib gettext genisoimage git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool llvm lrzsz msmtp ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
          sudo -E apt -y autoremove --purge
          sudo -E apt clean
          sudo -E timedatectl set-timezone "Asia/Shanghai"

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true

      # ----- 2. 检出代码 (从你的 Builder 仓库和 LEDE 源码) -----
      - name: Checkout builder config
        uses: actions/checkout@v4

      - name: Checkout LEDE source
        uses: actions/checkout@v4
        with:
          repository: coolsnowwolf/lede
          path: lede
          ref: master

      # ----- 3. 配置缓存 (加速二次编译) -----
      - name: Cache feeds
        uses: actions/cache@v4
        with:
          path: lede/feeds
          key: ${{ runner.os }}-feeds-${{ hashFiles('configs/*.config') }}
          restore-keys: ${{ runner.os }}-feeds-

      - name: Cache downloads
        uses: actions/cache@v4
        with:
          path: lede/dl
          key: ${{ runner.os }}-dl-${{ hashFiles('configs/*.config') }}
          restore-keys: ${{ runner.os }}-dl-

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-${{ matrix.device }}-${{ github.run_id }}
          restore-keys: ${{ runner.os }}-ccache-${{ matrix.device }}-

      # ----- 4. 配置 feeds (集成 PassWall 和 kenzok8 源) -----
      - name: Update feeds
        run: |
          cd lede
          # 添加你的私有 feeds 源
          printf '%s\n' \
            'src-git passwall_packages https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git;main' \
            'src-git passwall_luci https://github.com/Openwrt-Passwall/openwrt-passwall.git;main' \
            'src-git kenzo https://github.com/kenzok8/openwrt-packages.git' \
            'src-git small https://github.com/kenzok8/small.git' \
            | cat - feeds.conf.default > feeds.conf.default.new
          mv feeds.conf.default.new feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # ----- 5. 克隆额外插件 -----
      - name: Clone additional plugins
        run: |
          cd lede
          git clone --depth 1 https://github.com/sbwml/luci-app-mosdns.git package/mosdns
          git clone --depth 1 https://github.com/chenmozhijin/luci-app-turboacc.git package/turboacc
          git clone --depth 1 https://github.com/tsl0922/ttyd.git package/ttyd
          git clone --depth 1 https://github.com/eamonxg/luci-theme-aurora.git package/aurora

      # ----- 6. 生成 .config 文件 (核心：根据 matrix.device 组装配置) -----
      - name: Generate configuration file
        run: |
          cd lede
          # 组装基础配置 + 设备配置
          cat ../configs/common.config > .config
          cat ../configs/${{ matrix.device }}.config >> .config
          echo "CONFIG_CCACHE=y" >> .config
          
          # 修改默认 IP
          sed -i 's/192.168.1.1/10.10.10.1/g' package/base-files/files/bin/config_generate
          
          # ----- 插件配置 -----
          # PassWall
          echo "CONFIG_PACKAGE_luci-app-passwall=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-passwall_Including_Hysteria=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-passwall_Including_V2ray=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-passwall_Including_Xray=y" >> .config
          
          # 其他实用插件
          echo "CONFIG_PACKAGE_luci-app-mosdns=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-turboacc=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-ttyd=y" >> .config
          echo "CONFIG_PACKAGE_luci-theme-aurora=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-arpbind=y" >> .config
          
          # 禁用有问题的包
          echo "# CONFIG_PACKAGE_vlmcsd is not set" >> .config
          echo "# CONFIG_PACKAGE_luci-app-vlmcsd is not set" >> .config
          
          # 完成配置生成
          make defconfig

      # ----- 7. 下载源码包 -----
      - name: Download packages
        run: |
          cd lede
          make download -j16
          ccache -s

      # ----- 8. 编译固件 (并行 + 容错) -----
      - name: Compile firmware
        run: |
          cd lede
          echo "开始编译 ${{ matrix.device }} 设备: $(date)"
          if make -j$(nproc); then
            echo "编译成功: $(date)"
          else
            echo "并行编译失败，尝试单线程调试..."
            make -j1 V=s
          fi
          echo "======================="
          echo "Space usage:"
          echo "======================="
          df -h
          ccache -s

      # ----- 9. 整理产物 (保留固件和构建信息) -----
      - name: Prepare artifact
        run: |
          cd lede
          mkdir -p ../release/${{ matrix.device }}
          # 复制固件
          find bin/targets/ -type f \( -name "*.img.gz" -o -name "*.bin" -o -name "*.vmdk" -o -name "*.qcow2" -o -name "*.ext4.gz" -o -name "*.squashfs" -o -name "*.img" \) -exec cp -v {} ../release/${{ matrix.device }} \;
          # 复制构建信息
          cp .config ../release/${{ matrix.device }}/config.build.txt
          find bin/targets/ -type f -name "*.buildinfo" -exec cp {} ../release/${{ matrix.device }}/ \;
          find bin/targets/ -type f -name "*.manifest" -exec cp {} ../release/${{ matrix.device }}/ \;
          # 生成校验和
          cd ../release/${{ matrix.device }}
          sha256sum * > sha256sums.txt

      # ----- 10. 上传产物 (按设备区分) -----
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-${{ matrix.device }}
          path: release/${{ matrix.device }}
          retention-days: 7

      # ----- 11. 发布到 Release (仅主分支推送时触发) -----
      - name: Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: nightly-${{ github.run_number }}
          name: OpenWrt Build ${{ github.run_number }}
          body: |
            ## 固件信息
            - **编译时间**: $(date '+%Y-%m-%d %H:%M:%S')
            - **管理地址**: http://10.10.10.1
            - **用户名**: root
            - **密码**: password
            
            ## 设备: ${{ matrix.device }}
            
            ## 包含插件
            - PassWall, MosDNS, TurboACC, TTYD, Aurora主题, ARP绑定
            
            ## 下载说明
            - R2S: 写入 TF 卡
            - CR660x: 通过 breed 刷入
            - X86: 写入硬盘或虚拟机直接使用
          files: |
            release/${{ matrix.device }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}