# 唯一维护的固件编译工作流（LEDE + ImmortalWrt）
name: Build OpenWrt Firmware

on:
  workflow_dispatch:
    inputs:
      source:
        description: "源码树 (configs/<source>/)"
        type: choice
        required: true
        default: immortalwrt
        options:
          - immortalwrt
          - lede
      device:
        description: "设备代号 (configs/devices.list)"
        type: choice
        required: true
        default: all
        options:
          - all
          - xiaomi-ax3600
          - xiaomi-ax9000
          - xiaomi-wr30u
          - xiaomi-ax6000
          - redmi-ax6000
          - phicomm-k2p
          - xiaomi-3g
          - xiaomi-cr660x
          - r2s
          - x86_64
          - raspberrypi-4b

  schedule:
    # 定时仅编 ImmortalWrt 全设备；LEDE 请手动选 source=lede
    - cron: "0 20 * * 0"

permissions:
  contents: write

env:
  TZ: Asia/Shanghai
  CCACHE_DIR: ~/.ccache
  CCACHE_COMPRESS: "true"
  CCACHE_COMPRESSLEVEL: "6"
  CCACHE_MAXSIZE: 10G
  SRC_DIR: src

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
      repo: ${{ steps.resolve.outputs.repo }}
      upstream: ${{ steps.resolve.outputs.upstream }}
    steps:
      - uses: actions/checkout@v5
      - id: resolve
        run: |
          SOURCE="${{ github.event.inputs.source }}"
          DEVICE="${{ github.event.inputs.device }}"
          [ -n "$SOURCE" ] || SOURCE="immortalwrt"
          bash scripts/ci-resolve-build.sh "$SOURCE" "$DEVICE" "${{ github.event_name }}" >> "$GITHUB_OUTPUT"

  build:
    needs: setup
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    name: ${{ needs.setup.outputs.repo }} · ${{ matrix.device }}

    env:
      REPO: ${{ needs.setup.outputs.repo }}
      UPSTREAM: ${{ needs.setup.outputs.upstream }}

    steps:
      - uses: actions/checkout@v5

      - name: Checkout ${{ env.REPO }} source
        uses: actions/checkout@v5
        with:
          repository: ${{ env.UPSTREAM }}
          ref: master
          path: ${{ env.SRC_DIR }}
          fetch-depth: 1

      - name: Resolve cache platform
        id: cache
        run: echo "platform=$(bash scripts/cache-platform.sh configs/${REPO}/${{ matrix.device }}.config)" >> "$GITHUB_OUTPUT"

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android
          sudo docker image prune -af
          df -h

      - name: Cache dl
        uses: actions/cache@v5
        with:
          path: ${{ env.SRC_DIR }}/dl
          key: dl-${{ env.REPO }}-kconfig-fix-v5-${{ hashFiles('configs/**', '.github/workflows/build.yml', 'scripts/setup-custom-packages.sh', 'scripts/ci-prepare-config.sh', 'scripts/sanitize-config.sh') }}
          restore-keys: dl-${{ env.REPO }}-

      - name: Cache feeds
        uses: actions/cache@v5
        with:
          path: ${{ env.SRC_DIR }}/feeds
          key: feeds-${{ env.REPO }}-kconfig-fix-v5-${{ hashFiles('configs/**', '.github/workflows/build.yml', 'scripts/setup-custom-packages.sh', 'scripts/ci-prepare-config.sh', 'scripts/sanitize-config.sh') }}
          restore-keys: feeds-${{ env.REPO }}-

      - name: Scrub cached feeds before setup (inline CI fix)
        working-directory: ${{ env.SRC_DIR }}
        run: |
          set -euo pipefail
          sed -i '\|kenzok8/openwrt-packages|d; \|kenzok8/small|d' feeds.conf.default 2>/dev/null || true
          sed -i '\|kenzok8/openwrt-packages|d; \|kenzok8/small|d' feeds.conf 2>/dev/null || true
          rm -rf feeds/small feeds/kenzo package/feeds/small package/feeds/kenzo 2>/dev/null || true

          while IFS= read -r mk; do
            [ -n "$mk" ] || continue
            case "$mk" in ./dl/*|./build_dir/*|./staging_dir/*) continue ;; esac
            rm -rf "$(dirname "$mk")"
          done < <(grep -RIlE 'PKG_NAME:=(nftables-json|nftables-nojson)' . 2>/dev/null || true)

          dnsmk="package/network/services/dnsmasq/Makefile"
          if [ -f "$dnsmk" ]; then
            sed -i 's/+PACKAGE_dnsmasq_full_nftset:nftables-json//' "$dnsmk"
          fi

          keep_luci=""
          keep_kmod=""
          [ -f package/luci-app-turboacc/Makefile ] && keep_luci="$(cd package/luci-app-turboacc && pwd)"
          [ -f package/nft-fullcone/Makefile ] && keep_kmod="$(cd package/nft-fullcone && pwd)"

          remove_dup_dir() {
            local dir="$1" keep="$2"
            [ -n "$dir" ] || return 0
            [ -d "$dir" ] || return 0
            case "$dir" in
              package/luci-app-turboacc|./package/luci-app-turboacc|package/nft-fullcone|./package/nft-fullcone) return 0 ;;
            esac
            local abs
            abs="$(cd "$dir" && pwd)"
            [ -n "$keep" ] && [ "$abs" = "$keep" ] && return 0
            rm -rf "$dir"
          }

          while IFS= read -r mk; do
            [ -n "$mk" ] || continue
            case "$mk" in ./dl/*|./build_dir/*|./staging_dir/*|./.ci-stash-turboacc/*) continue ;; esac
            remove_dup_dir "$(dirname "$mk")" "$keep_luci"
          done < <(grep -RIl --include='Makefile' 'PKG_NAME:=luci-app-turboacc' feeds package/feeds package/lean 2>/dev/null || true)

          while IFS= read -r mk; do
            [ -n "$mk" ] || continue
            case "$mk" in ./dl/*|./build_dir/*|./staging_dir/*|./.ci-stash-turboacc/*|./package/nft-fullcone/Makefile) continue ;; esac
            remove_dup_dir "$(dirname "$mk")" "$keep_kmod"
          done < <(grep -RIlE --include='Makefile' 'PKG_NAME:=nft-fullcone|PKG_NAME:=kmod-nft-fullcone|KernelPackage/nft-fullcone' feeds package/feeds package/lean package 2>/dev/null || true)

          rm -rf feeds/luci/applications/luci-app-turboacc feeds/luci/applications/luci-app-turboacc-chenmozhijin 2>/dev/null || true

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: ~/.ccache
          key: ccache-${{ env.REPO }}-${{ steps.cache.outputs.platform }}-${{ hashFiles('configs/**/common.config', 'configs/custom-plugins.config') }}
          restore-keys: |
            ccache-${{ env.REPO }}-${{ steps.cache.outputs.platform }}-
            ccache-${{ env.REPO }}-

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gettext \
            git libssl-dev libelf-dev python3 python3-dev python3-distutils \
            rsync unzip zlib1g-dev file wget subversion patch upx-ucl ccache \
            ecj fastjar java-propose-classpath libncurses5-dev libncursesw5-dev \
            libz-dev curl cmake jq rename tar

      - name: Setup feeds and packages
        working-directory: ${{ env.SRC_DIR }}
        run: bash ${{ github.workspace }}/scripts/setup-custom-packages.sh . append ${{ github.workspace }}/configs

      - name: Scrub feeds after setup (inline CI fix)
        working-directory: ${{ env.SRC_DIR }}
        run: |
          set -euo pipefail
          sed -i '\|kenzok8/openwrt-packages|d; \|kenzok8/small|d' feeds.conf.default 2>/dev/null || true
          sed -i '\|kenzok8/openwrt-packages|d; \|kenzok8/small|d' feeds.conf 2>/dev/null || true
          rm -rf feeds/small feeds/kenzo package/feeds/small package/feeds/kenzo 2>/dev/null || true
          while IFS= read -r mk; do
            [ -n "$mk" ] || continue
            case "$mk" in ./dl/*|./build_dir/*|./staging_dir/*) continue ;; esac
            rm -rf "$(dirname "$mk")"
          done < <(grep -RIlE 'PKG_NAME:=(nftables-json|nftables-nojson)' . 2>/dev/null || true)
          rm -rf feeds/luci/applications/luci-app-turboacc feeds/luci/applications/luci-app-turboacc-chenmozhijin 2>/dev/null || true

      - name: Prepare firmware overlay
        working-directory: ${{ github.workspace }}
        run: |
          bash scripts/generate-banner.sh "${REPO}" files
          bash scripts/bundle-oh-my-bash.sh files
          bash scripts/install-files-overlay.sh "${{ env.SRC_DIR }}" files

      - name: Generate .config
        run: |
          bash ${{ github.workspace }}/scripts/ci-prepare-config.sh \
            "${REPO}" "${{ matrix.device }}" "${{ github.workspace }}" "${{ github.workspace }}/${{ env.SRC_DIR }}"

      - name: Defconfig and TurboACC (inline CI fix)
        working-directory: ${{ env.SRC_DIR }}
        run: |
          set -euo pipefail
          STASH=".ci-stash-turboacc"
          restored=0
          cleanup() {
            if [ "$restored" -eq 0 ]; then
              for d in luci-app-turboacc nft-fullcone; do
                [ -d "${STASH}/${d}" ] || continue
                rm -rf "package/${d}"
                mv "${STASH}/${d}" "package/${d}"
              done
            fi
          }
          trap cleanup EXIT

          mkdir -p "$STASH"
          for d in luci-app-turboacc nft-fullcone; do
            if [ -d "package/${d}" ]; then
              rm -rf "${STASH}/${d}"
              mv "package/${d}" "${STASH}/${d}"
            fi
          done

          make defconfig > defconfig.log 2>&1 || { cat defconfig.log; exit 1; }
          cat defconfig.log
          if grep -q 'recursive dependency detected' defconfig.log; then
            echo "ERROR: recursive dependency detected during base defconfig" >&2
            exit 1
          fi

          for d in luci-app-turboacc nft-fullcone; do
            [ -d "${STASH}/${d}" ] || continue
            rm -rf "package/${d}"
            mv "${STASH}/${d}" "package/${d}"
          done
          restored=1

          [ -f package/luci-app-turboacc/Makefile ] || { echo "ERROR: missing package/luci-app-turboacc/Makefile" >&2; exit 1; }
          [ -f package/nft-fullcone/Makefile ] || { echo "ERROR: missing package/nft-fullcone/Makefile" >&2; exit 1; }

          if ! grep -q 'ci-patched-turboacc-defaults' package/luci-app-turboacc/Makefile; then
            sed -i \
              -e '/INCLUDE_OFFLOADING/,/^config /{ s/^[[:space:]]*default y if.*/	default n # ci-patched-turboacc-defaults/; }' \
              -e '/INCLUDE_NFT_FULLCONE/,/^config /{ s/^[[:space:]]*default y[[:space:]]*$/	default n # ci-patched-turboacc-defaults/; }' \
              -e '/INCLUDE_BBR_CCA/,/^config /{ s/^[[:space:]]*default y[[:space:]]*$/	default n # ci-patched-turboacc-defaults/; }' \
              package/luci-app-turboacc/Makefile
          fi

          cat "${{ github.workspace }}/configs/snippets/turboacc.config" >> .config
          ./scripts/config -e PACKAGE_kmod-nft-fullcone
          ./scripts/config -e PACKAGE_kmod-tcp-bbr
          ./scripts/config -d PACKAGE_kmod-nft-offload 2>/dev/null || true
          ./scripts/config -e PACKAGE_luci-app-turboacc
          ./scripts/config -e PACKAGE_luci-app-turboacc_INCLUDE_BBR_CCA
          ./scripts/config -e PACKAGE_luci-app-turboacc_INCLUDE_NFT_FULLCONE
          ./scripts/config -d PACKAGE_luci-app-turboacc_INCLUDE_OFFLOADING 2>/dev/null || true

          make oldconfig > turboacc-oldconfig.log 2>&1 || { cat turboacc-oldconfig.log; exit 1; }
          cat turboacc-oldconfig.log
          if grep -q 'recursive dependency detected' turboacc-oldconfig.log; then
            echo "ERROR: recursive dependency detected after TurboACC enable" >&2
            exit 1
          fi

      - name: Compile firmware
        run: |
          TOOLCHAIN=""
          [ "${REPO}" = "immortalwrt" ] && TOOLCHAIN=1
          echo "Build ${REPO} ${{ matrix.device }} (platform=${{ steps.cache.outputs.platform }})"
          bash ${{ github.workspace }}/scripts/ci-compile.sh "${{ github.workspace }}/${{ env.SRC_DIR }}" "$TOOLCHAIN"

      - name: Pack firmware
        working-directory: ${{ env.SRC_DIR }}
        run: |
          bash ${{ github.workspace }}/scripts/pack-firmware.sh \
            "${{ matrix.device }}" "${REPO}" \
            "${{ github.workspace }}/configs/${REPO}/${{ matrix.device }}.config" \
            bin/targets "../release/${{ matrix.device }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ env.REPO }}-${{ matrix.device }}
          path: release/${{ matrix.device }}
          retention-days: 7

      - name: Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: Jas0n0ss-${{ env.REPO }}-${{ matrix.device }}-${{ github.run_number }}
          name: "Jas0n0ss ${{ env.REPO }} — ${{ matrix.device }} (#${{ github.run_number }})"
          body: |
            ## Jas0n0ss OpenWrt (${{ env.REPO }})

            | 项 | 值 |
            |----|-----|
            | 源码 | `${{ env.UPSTREAM }}` |
            | 设备 | `${{ matrix.device }}` |
            | 命名 | `Jas0n0ss-${{ env.REPO }}-<代号>-<设备>-<平台>-<类型>.<后缀>` |
            | 管理 | http://10.10.10.1 · `root` / `password` |
            | 配置仓 | https://github.com/Jas0n0ss/openwrt-lede-builder |
          files: release/${{ matrix.device }}/Jas0n0ss-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
