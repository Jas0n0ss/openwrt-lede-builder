name: Build OpenWrt (Optimized)

on:
  workflow_dispatch:
    inputs:
      device:
        description: '设备'
        required: true
        default: 'all'
        type: choice
        options: ['all', 'r2s', 'cr660x', 'x86']
      clean:
        description: '完全清理编译缓存'
        required: false
        default: false
        type: boolean

env:
  # Docker 配置
  BUILDER_IMAGE: ghcr.io/${{ github.repository_owner }}/openwrt-builder:latest
  
  # CCache 配置
  CCACHE_DIR: /home/runner/.ccache
  CCACHE_SIZE: 5G
  CCACHE_COMPRESS: 1
  CCACHE_COMPRESSLEVEL: 6
  
  # 编译优化
  MAKEFLAGS: -j$(nproc)
  DOWNLOAD_TIMEOUT: 30
  GIT_DEPTH: 1

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        device: ${{ fromJSON(github.event.inputs.device == 'all' && '["r2s","cr660x","x86"]' || format('["{0}"]', github.event.inputs.device)) }}
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Cache Docker layers
      uses: actions/cache@v4
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildx-
    
    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Cache OpenWrt downloads
      id: cache-dl
      uses: actions/cache@v4
      with:
        path: |
          lede/dl
          ~/.ccache
        key: ${{ runner.os }}-${{ matrix.device }}-dl-${{ github.run_id }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.device }}-dl-
          ${{ runner.os }}-dl-
    
    - name: Cache feeds
      id: cache-feeds
      uses: actions/cache@v4
      with:
        path: |
          lede/feeds
          lede/.config
        key: ${{ runner.os }}-${{ matrix.device }}-feeds-${{ hashFiles('configs/') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.device }}-feeds-
    
    - name: Build in Docker container
      uses: addnab/docker-run-action@v3
      with:
        image: ${{ env.BUILDER_IMAGE }}
        options: |
          -v ${{ github.workspace }}:/workspace
          -v ${{ env.CCACHE_DIR }}:/ccache
          -e CCACHE_DIR=/ccache
          -e MAKEFLAGS=${{ env.MAKEFLAGS }}
          --workdir /workspace/lede
        run: |
          # 复制配置
          cp ../configs/common.config .config
          cat ../configs/${{ matrix.device }}.config >> .config
          
          # 配置 feeds
          printf '%s\n' \
            'src-git passwall_packages https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git;main' \
            'src-git passwall_luci https://github.com/Openwrt-Passwall/openwrt-passwall.git;main' \
            'src-git kenzo https://github.com/kenzok8/openwrt-packages.git' \
            'src-git small https://github.com/kenzok8/small.git' \
            | cat - feeds.conf.default > feeds.conf.default.new
          mv feeds.conf.default.new feeds.conf.default
          
          # 更新 feeds（使用缓存）
          if [ ! -f "feeds/.updated" ] || [ "${{ inputs.clean }}" = "true" ]; then
            ./scripts/feeds update -a
            touch feeds/.updated
          fi
          
          ./scripts/feeds install -a
          
          # 配置和编译
          if [ "${{ inputs.clean }}" = "true" ]; then
            make clean
          fi
          
          make defconfig
          
          # 使用 ccache 统计
          ccache -s
          
          # 下载源码（如果缓存未命中）
          if [ ! -f "dl/.downloaded" ] || [ "${{ inputs.clean }}" = "true" ]; then
            make download -j8
            touch dl/.downloaded
          fi
          
          # 编译
          echo "开始编译 $(date)"
          make -j$(nproc) V=s
          echo "编译完成 $(date)"
          
          ccache -s
      
    - name: Package artifacts
      run: |
        cd lede
        mkdir -p ../release/${{ matrix.device }}
        find bin/targets/ -type f \( -name "*.img.gz" -o -name "*.bin" -o -name "*.vmdk" \) -exec cp -v {} ../release/${{ matrix.device }} \;
        cp .config ../release/${{ matrix.device }}/config.txt
    
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: openwrt-${{ matrix.device }}
        path: release/${{ matrix.device }}
        retention-days: 7
