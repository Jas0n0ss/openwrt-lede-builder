name: Build Docker Image

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'  # 每月1号更新

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./docker
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/openwrt-builder:latest
            ghcr.io/${{ github.repository_owner }}/openwrt-builder:${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
