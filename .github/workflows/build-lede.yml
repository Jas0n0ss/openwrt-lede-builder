name: Build LEDE Firmware

on:
  workflow_dispatch:
    inputs:
      device:
        description: '设备'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - r2s
          - cr660x
          - ax6000
          - x86_64
          - raspberrypi-4b
  schedule:
    - cron: '0 20 * * 0'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        device: ${{ fromJSON(github.event_name == 'workflow_dispatch' && github.event.inputs.device != 'all' && format('["{0}"]', github.event.inputs.device) || '["r2s","cr660x","ax6000","x86_64","raspberrypi-4b"]') }}
    name: Build LEDE for ${{ matrix.device }}

    steps:
      - name: Checkout builder config
        uses: actions/checkout@v4

      - name: Checkout LEDE source
        uses: actions/checkout@v4
        with:
          repository: coolsnowwolf/lede
          path: lede
          ref: master

      - name: Setup dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
            gettext git libssl-dev libelf-dev python3-distutils python3-dev \
            rsync unzip zlib1g-dev file wget subversion patch upx-ucl \
            ccache ecj fastjar jarwrapper java-propose-classpath libz-dev \
            libncurses5-dev libncursesw5-dev

      - name: Configure feeds (PassWall official method)
        run: |
          cd lede
          cp feeds.conf.default feeds.conf.default.bak
          cat > feeds.conf.default << 'EOF'
          src-git passwall_packages https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git;main
          src-git passwall_luci https://github.com/Openwrt-Passwall/openwrt-passwall.git;main
          src-git kenzo https://github.com/kenzok8/openwrt-packages.git
          src-git small https://github.com/kenzok8/small.git
          EOF
          cat feeds.conf.default.bak >> feeds.conf.default
          rm feeds.conf.default.bak
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Clone additional plugins
        run: |
          cd lede
          git clone --depth 1 https://github.com/sbwml/luci-app-mosdns.git package/mosdns || true
          git clone --depth 1 https://github.com/chenmozhijin/luci-app-turboacc.git package/turboacc || true
          git clone --depth 1 https://github.com/tsl0922/ttyd.git package/ttyd || true
          git clone --depth 1 https://github.com/eamonxg/luci-theme-aurora.git package/aurora || true

      - name: Copy custom files
        run: |
          cd lede
          if [ -d "${{ github.workspace }}/files" ]; then
            cp -rf ${{ github.workspace }}/files/* ./
            chmod +x files/etc/uci-defaults/* 2>/dev/null || true
            chmod +x etc/uci-defaults/* 2>/dev/null || true
          fi

      - name: Generate .config from preset files
        run: |
          cd lede
          if [ ! -f "${{ github.workspace }}/configs/common.config" ]; then
            echo "错误: common.config 不存在"
            exit 1
          fi
          if [ ! -f "${{ github.workspace }}/configs/${{ matrix.device }}.config" ]; then
            echo "错误: ${{ matrix.device }}.config 不存在"
            exit 1
          fi
          cat ${{ github.workspace }}/configs/common.config > .config
          cat ${{ github.workspace }}/configs/${{ matrix.device }}.config >> .config
          make defconfig

      - name: Prebuild core dependencies (toolchain, kernel, xray-core)
        run: |
          cd lede
          make toolchain/compile -j$(nproc) || make toolchain/compile -j1 V=s
          make target/linux/compile -j$(nproc) || make target/linux/compile -j1 V=s
          make package/xray-core/compile -j$(nproc) || make package/xray-core/compile -j1 V=s

      - name: Download sources
        run: |
          cd lede
          make download -j16

      - name: Compile firmware
        run: |
          cd lede
          echo "开始编译 ${{ matrix.device }}: $(date)"
          if make -j$(nproc); then
            echo "编译成功: $(date)"
          else
            echo "并行编译失败，尝试单线程..."
            make -j1 V=s
          fi

      - name: Prepare artifacts
        run: |
          cd lede
          mkdir -p ../release/${{ matrix.device }}
          find bin/targets/ -type f \( -name "*.img.gz" -o -name "*.bin" -o -name "*.vmdk" -o -name "*.qcow2" -o -name "*.sdcard.img" -o -name "*-sysupgrade.*" \) 2>/dev/null | while read file; do
            cp "$file" "../release/${{ matrix.device }}/"
          done
          cd ../release/${{ matrix.device }}
          sha256sum * > sha256sums.txt 2>/dev/null
          echo "=== 生成的固件 ==="
          ls -lh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lede-${{ matrix.device }}
          path: release/${{ matrix.device }}
          retention-days: 7

      - name: Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: LEDE-${{ matrix.device }}-${{ github.run_number }}
          name: "LEDE Firmware for ${{ matrix.device }} - Build ${{ github.run_number }}"
          body: |
            ## LEDE 固件自动构建
            - **设备**: ${{ matrix.device }}
            - **管理地址**: http://10.10.10.1
            - **用户名**: root | **密码**: password
          files: |
            release/${{ matrix.device }}/*.img.gz
            release/${{ matrix.device }}/*.bin
            release/${{ matrix.device }}/*.vmdk
            release/${{ matrix.device }}/*.qcow2
            release/${{ matrix.device }}/*.sdcard.img
            release/${{ matrix.device }}/*-sysupgrade.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}