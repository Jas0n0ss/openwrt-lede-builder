name: Build LEDE Firmware

on:
  workflow_dispatch:
    inputs:
      device:
        description: '设备代号 (见 configs/devices.list)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - xiaomi-ax3600
          - xiaomi-ax9000
          - xiaomi-wr30u
          - xiaomi-ax6000
          - redmi-ax6000
          - phicomm-k2p
          - xiaomi-3g
          - xiaomi-cr660x
          - r2s
          - x86_64
          - raspberrypi-4b
  schedule:
    - cron: '0 20 * * 0'

permissions:
  contents: write

env:
  TZ: Asia/Shanghai
  CCACHE_DIR: ~/.ccache
  CCACHE_COMPRESS: "true"
  CCACHE_COMPRESSLEVEL: "6"
  CCACHE_MAXSIZE: 10G

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
      - id: set-matrix
        run: |
          DEVICE="${{ github.event.inputs.device }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "$DEVICE" ] && [ "$DEVICE" != "all" ]; then
            bash scripts/device-matrix.sh "$DEVICE" >> $GITHUB_OUTPUT
          else
            bash scripts/device-matrix.sh all >> $GITHUB_OUTPUT
          fi

  build:
    needs: setup
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    name: Build LEDE for ${{ matrix.device }}

    steps:
      - name: Checkout builder config
        uses: actions/checkout@v5

      - name: Checkout LEDE source
        uses: actions/checkout@v5
        with:
          repository: coolsnowwolf/lede
          path: lede
          ref: master
          fetch-depth: 1

      - name: Resolve cache platform
        id: cache
        run: |
          echo "platform=$(bash scripts/cache-platform.sh configs/lede/${{ matrix.device }}.config)" >> $GITHUB_OUTPUT

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android
          sudo docker image prune -af
          df -h

      - name: Cache downloads (dl)
        uses: actions/cache@v5
        with:
          path: lede/dl
          key: dl-lede-v4-${{ hashFiles('configs/lede/**', 'configs/custom-plugins.config', 'scripts/setup-custom-packages.sh', 'scripts/patch-feeds.sh', 'scripts/verify-setup.sh') }}
          restore-keys: |
            dl-lede-

      - name: Cache feeds
        uses: actions/cache@v5
        with:
          path: lede/feeds
          key: feeds-lede-v4-${{ hashFiles('configs/lede/**', 'configs/custom-plugins.config', 'scripts/setup-custom-packages.sh', 'scripts/patch-feeds.sh', 'scripts/verify-setup.sh') }}
          restore-keys: |
            feeds-lede-

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: ~/.ccache
          key: ccache-lede-${{ steps.cache.outputs.platform }}-${{ hashFiles('configs/lede/**', 'configs/custom-plugins.config') }}
          restore-keys: |
            ccache-lede-${{ steps.cache.outputs.platform }}-
            ccache-lede-

      - name: Setup dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
            gettext git libssl-dev libelf-dev python3-distutils python3-dev \
            rsync unzip zlib1g-dev file wget subversion patch upx-ucl \
            ccache ecj fastjar jarwrapper java-propose-classpath libz-dev \
            libncurses5-dev libncursesw5-dev

      - name: Setup feeds and custom packages
        working-directory: lede
        run: bash ${{ github.workspace }}/scripts/setup-custom-packages.sh . append ${{ github.workspace }}/configs

      - name: Prepare firmware overlay
        run: |
          bash ${{ github.workspace }}/scripts/generate-banner.sh lede ${{ github.workspace }}/files
          bash ${{ github.workspace }}/scripts/bundle-oh-my-bash.sh ${{ github.workspace }}/files

      - name: Copy custom files
        run: bash ${{ github.workspace }}/scripts/install-files-overlay.sh lede ${{ github.workspace }}/files
        working-directory: ${{ github.workspace }}

      - name: Generate .config
        run: |
          cd lede
          if [ ! -f "${{ github.workspace }}/configs/lede/common.config" ]; then
            echo "错误: common.config 不存在"
            exit 1
          fi
          if [ ! -f "${{ github.workspace }}/configs/lede/${{ matrix.device }}.config" ]; then
            echo "错误: ${{ matrix.device }}.config 不存在"
            exit 1
          fi
          cat ${{ github.workspace }}/configs/lede/common.config > .config
          cat ${{ github.workspace }}/configs/lede/${{ matrix.device }}.config >> .config
          cat ${{ github.workspace }}/configs/custom-plugins.config >> .config
          cat ${{ github.workspace }}/configs/snippets/no-rust-passwall.config >> .config
          echo "CONFIG_DEVEL=y" >> .config
          echo "CONFIG_CCACHE=y" >> .config
          bash ${{ github.workspace }}/scripts/verify-defconfig.sh "$(pwd)"

      - name: Compile firmware
        run: |
          echo "开始编译 ${{ matrix.device }} (platform=${{ steps.cache.outputs.platform }}): $(date)"
          bash ${{ github.workspace }}/scripts/ci-compile.sh lede
          echo "编译完成: $(date)"

      - name: Prepare artifacts
        run: |
          cd lede
          bash ${{ github.workspace }}/scripts/pack-firmware.sh \
            "${{ matrix.device }}" \
            "lede" \
            "${{ github.workspace }}/configs/lede/${{ matrix.device }}.config" \
            "bin/targets" \
            "../release/${{ matrix.device }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: lede-${{ matrix.device }}
          path: release/${{ matrix.device }}
          retention-days: 7

      - name: Release
        if: success() && github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: Jas0n0ss-lede-${{ matrix.device }}-${{ github.run_number }}
          name: "Jas0n0ss OpenWrt (LEDE) — ${{ matrix.device }} (#${{ github.run_number }})"
          body: |
            ## Jas0n0ss OpenWrt (LEDE)

            - **设备代号**: `${{ matrix.device }}`
            - **固件命名**: `Jas0n0ss-lede-<代号>-<OpenWrt设备>-<平台>-<类型>.<后缀>`
            - **源码**: https://github.com/Jas0n0ss/openwrt-lede-builder
            - **管理地址**: http://10.10.10.1
            - **用户名**: root | **密码**: password
          files: release/${{ matrix.device }}/Jas0n0ss-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
