name: Build LEDE Firmware

on:
  workflow_dispatch:
    inputs:
      device:
        description: '设备'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - r2s
          - cr660x
          - ax6000
          - x86_64
          - raspberrypi-4b
  schedule:
    - cron: '0 20 * * 0'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.device }}" != "all" ]; then
            echo 'matrix={"device":["${{ github.event.inputs.device }}"]}' >> $GITHUB_OUTPUT
          else
            echo 'matrix={"device":["r2s","cr660x","ax6000","x86_64","raspberrypi-4b"]}' >> $GITHUB_OUTPUT
          fi

  build:
    needs: setup
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    name: Build LEDE for ${{ matrix.device }}

    steps:
      - name: Checkout builder config
        uses: actions/checkout@v4

      - name: Checkout LEDE source
        uses: actions/checkout@v4
        with:
          repository: coolsnowwolf/lede
          path: lede
          ref: master

      # ===== 缓存步骤 =====
      - name: Cache downloads (dl)
        uses: actions/cache@v4
        with:
          path: lede/dl
          key: dl-${{ matrix.device }}-${{ hashFiles('configs/common.config', 'configs/${{ matrix.device }}.config') }}
          restore-keys: |
            dl-${{ matrix.device }}-
            dl-
      - name: Cache feeds
        uses: actions/cache@v4
        with:
          path: lede/feeds
          key: feeds-${{ hashFiles('lede/feeds.conf.default') }}
          restore-keys: |
            feeds-
      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ matrix.device }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ matrix.device }}-
            ccache-

      - name: Setup dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
            gettext git libssl-dev libelf-dev python3-distutils python3-dev \
            rsync unzip zlib1g-dev file wget subversion patch upx-ucl \
            ccache ecj fastjar jarwrapper java-propose-classpath libz-dev \
            libncurses5-dev libncursesw5-dev

      - name: Configure feeds (PassWall official method)
        run: |
          cd lede
          cat > feeds.conf.default << 'EOF'
          src-git passwall_packages https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git;main
          src-git passwall_luci https://github.com/Openwrt-Passwall/openwrt-passwall.git;main
          src-git kenzo https://github.com/kenzok8/openwrt-packages.git
          src-git small https://github.com/kenzok8/small.git
          src-git packages https://git.openwrt.org/feed/packages.git;openwrt-23.05
          src-git luci https://git.openwrt.org/project/luci.git;openwrt-23.05
          EOF
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Install all missing dependencies
        run: |
          cd lede
          # 安装所有缺失的依赖（忽略不存在的包）
          for pkg in bc pciutils lm-sensors wsdd2 luci-app-ksmbd luci-app-samba4 \
                      libpam ddns-scripts wget-ssl luci-compat bash jq ntpdate \
                      smartmontools zoneinfo-all coreutils coreutils-nohup \
                      libunistring libxml2 luci-proto-ipv6 liblzma libpcre2 \
                      libnetsnmp libcurl libtins libyaml-cpp glib2 libgpiod \
                      libtirpc libaio luci-lua-runtime maccalc; do
            ./scripts/feeds install $pkg 2>/dev/null || echo "警告: $pkg 不存在，跳过"
          done
          ./scripts/feeds install -a

      - name: Clone additional plugins
        run: |
          cd lede
          git clone --depth 1 https://github.com/sbwml/luci-app-mosdns.git package/mosdns || true
          git clone --depth 1 https://github.com/chenmozhijin/luci-app-turboacc.git package/turboacc || true
          git clone --depth 1 https://github.com/tsl0922/ttyd.git package/ttyd || true
          git clone --depth 1 https://github.com/eamonxg/luci-theme-aurora.git package/aurora || true

      - name: Copy custom files
        run: |
          cd lede
          if [ -d "${{ github.workspace }}/files" ]; then
            cp -rf ${{ github.workspace }}/files/* ./
            chmod +x files/etc/uci-defaults/* 2>/dev/null || true
            chmod +x etc/uci-defaults/* 2>/dev/null || true
          fi

      - name: Install all missing dependencies
        run: |
          cd lede
          
          # 安装所有缺失的依赖包
          ./scripts/feeds install bc
          ./scripts/feeds install pciutils
          ./scripts/feeds install lm-sensors
          ./scripts/feeds install wsdd2
          ./scripts/feeds install luci-app-ksmbd
          ./scripts/feeds install luci-app-samba4
          ./scripts/feeds install libpam
          ./scripts/feeds install ddns-scripts
          ./scripts/feeds install wget-ssl
          ./scripts/feeds install luci-compat
          ./scripts/feeds install bash
          ./scripts/feeds install jq
          ./scripts/feeds install ntpdate
          ./scripts/feeds install smartmontools
          ./scripts/feeds install zoneinfo-all
          ./scripts/feeds install coreutils
          ./scripts/feeds install coreutils-nohup
          ./scripts/feeds install libunistring
          ./scripts/feeds install libxml2
          ./scripts/feeds install luci-proto-ipv6
          ./scripts/feeds install liblzma
          ./scripts/feeds install libpcre2
          ./scripts/feeds install libnetsnmp
          ./scripts/feeds install libcurl
          ./scripts/feeds install libtins
          ./scripts/feeds install libyaml-cpp
          ./scripts/feeds install glib2
          ./scripts/feeds install libgpiod
          ./scripts/feeds install libtirpc
          ./scripts/feeds install libaio
          ./scripts/feeds install luci-lua-runtime
          ./scripts/feeds install maccalc
          
          # 重新安装所有 feeds
          ./scripts/feeds install -a

      - name: Clean problematic packages and generate .config
        run: |
          cd lede
          rm -rf feeds/kenzo/luci-theme-alpha 2>/dev/null || true
          rm -rf feeds/kenzo/luci-app-dockerman 2>/dev/null || true
          rm -rf feeds/luci/luci-app-dae 2>/dev/null || true
          rm -rf feeds/luci/luci-app-daed 2>/dev/null || true
          find feeds -name "*fchomo*" -type d -exec rm -rf {} + 2>/dev/null || true
          if [ ! -f "${{ github.workspace }}/configs/common.config" ]; then
            echo "错误: common.config 不存在"
            exit 1
          fi
          if [ ! -f "${{ github.workspace }}/configs/${{ matrix.device }}.config" ]; then
            echo "错误: ${{ matrix.device }}.config 不存在"
            exit 1
          fi
          cat ${{ github.workspace }}/configs/common.config > .config
          cat ${{ github.workspace }}/configs/${{ matrix.device }}.config >> .config

          make defconfig

      - name: Prebuild core dependencies with Go 1.24
        id: setup_go
        run: |
          cd lede
          wget -q https://go.dev/dl/go1.24.2.linux-amd64.tar.gz
          sudo tar -C /usr/local -xzf go1.24.2.linux-amd64.tar.gz
          echo "/usr/local/go/bin" >> $GITHUB_PATH
          echo "GOROOT=/usr/local/go" >> $GITHUB_ENV
          export PATH=/usr/local/go/bin:$PATH
          export GOROOT=/usr/local/go
          go version
          make toolchain/compile -j$(nproc) || make toolchain/compile -j1 V=s
          make target/linux/compile -j$(nproc) || make target/linux/compile -j1 V=s
          make package/xray-core/compile -j$(nproc) || make package/xray-core/compile -j1 V=s

      - name: Download sources
        run: |
          cd lede
          make download -j16

      - name: Compile firmware
        run: |
          cd lede
          echo "开始编译 ${{ matrix.device }}: $(date)"
          ccache -s  # 显示缓存命中情况
          if make -j$(nproc); then
            echo "编译成功: $(date)"
          else
            echo "并行编译失败，清理后单线程重试..."
            make target/linux/clean
            make package/xray-core/clean
            make -j1 V=s
          fi
          ccache -s  # 显示最终缓存统计

      - name: Prepare artifacts
        run: |
          cd lede
          mkdir -p ../release/${{ matrix.device }}
          find bin/targets/ -type f \( -name "*.img.gz" -o -name "*.bin" -o -name "*.vmdk" -o -name "*.qcow2" -o -name "*.sdcard.img" -o -name "*-sysupgrade.*" \) 2>/dev/null | while read file; do
            cp "$file" "../release/${{ matrix.device }}/"
          done
          cd ../release/${{ matrix.device }}
          sha256sum * > sha256sums.txt 2>/dev/null
          echo "=== 生成的固件 ==="
          ls -lh
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lede-${{ matrix.device }}
          path: release/${{ matrix.device }}
          retention-days: 7

      - name: Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: LEDE-${{ matrix.device }}-${{ github.run_number }}
          name: "LEDE Firmware for ${{ matrix.device }} - Build ${{ github.run_number }}"
          body: |
            ## LEDE 固件自动构建
            - **设备**: ${{ matrix.device }}
            - **管理地址**: http://10.10.10.1
            - **用户名**: root | **密码**: password
          files: |
            release/${{ matrix.device }}/*.img.gz
            release/${{ matrix.device }}/*.bin
            release/${{ matrix.device }}/*.vmdk
            release/${{ matrix.device }}/*.qcow2
            release/${{ matrix.device }}/*.sdcard.img
            release/${{ matrix.device }}/*-sysupgrade.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}