name: Build LEDE Firmware

on:
  workflow_dispatch:
    inputs:
      device:
        description: '设备'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - r2s
          - cr660x
          - ax6000
          - x86_64
          - raspberrypi-4b
  schedule:
    - cron: '0 20 * * 0'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.device }}" != "all" ]; then
            echo "matrix={\"device\":[\"${{ github.event.inputs.device }}\"]}" >> $GITHUB_OUTPUT
          else
            echo "matrix={\"device\":[\"r2s\",\"cr660x\",\"ax6000\",\"x86_64\",\"raspberrypi-4b\"]}" >> $GITHUB_OUTPUT
          fi

  build:
    needs: setup
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    name: Build LEDE for ${{ matrix.device }}

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo docker system prune -af || true
          df -h

      - name: Checkout builder config
        uses: actions/checkout@v4

      - name: Checkout LEDE source
        uses: actions/checkout@v4
        with:
          repository: coolsnowwolf/lede
          path: lede
          ref: master

      # ===== 缓存步骤 =====
      - name: Cache downloads (dl)
        uses: actions/cache@v4
        with:
          path: lede/dl
          key: dl-${{ matrix.device }}-${{ hashFiles('configs/common.config', 'configs/${{ matrix.device }}.config') }}
          restore-keys: |
            dl-${{ matrix.device }}-
            dl-

      - name: Cache feeds
        uses: actions/cache@v4
        with:
          path: lede/feeds
          key: feeds-${{ hashFiles('lede/feeds.conf.default') }}
          restore-keys: |
            feeds-

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ matrix.device }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ matrix.device }}-
            ccache-

      # ===== 环境准备 =====
      - name: Setup dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
            gettext git libssl-dev libelf-dev python3-distutils python3-dev \
            rsync unzip zlib1g-dev file wget subversion patch upx-ucl \
            ccache ecj fastjar jarwrapper java-propose-classpath libz-dev \
            libncurses5-dev libncursesw5-dev \
            golang-go cargo nodejs npm curl
          
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          source "$HOME/.cargo/env"
          rustc --version

      # ===== PassWall 官方 feeds 配置 =====
      - name: Configure feeds
        run: |
          cd lede
          cat > feeds.conf.default << 'EOF'
          src-git passwall_packages https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git;main
          src-git passwall_luci https://github.com/Openwrt-Passwall/openwrt-passwall.git;main
          src-git kenzo https://github.com/kenzok8/openwrt-packages.git
          src-git small https://github.com/kenzok8/small.git
          EOF
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # ===== 额外插件 =====
      - name: Clone additional plugins
        run: |
          cd lede
          git clone --depth 1 https://github.com/sbwml/luci-app-mosdns.git package/mosdns || true
          git clone --depth 1 https://github.com/chenmozhijin/luci-app-turboacc.git package/turboacc || true
          git clone --depth 1 https://github.com/tsl0922/ttyd.git package/ttyd || true
          git clone --depth 1 https://github.com/eamonxg/luci-theme-aurora.git package/aurora || true

      # ===== 安装缺失依赖 =====
      - name: Install missing dependencies
        run: |
          cd lede
          for pkg in libpam libpcre2 libev libsodium libudns libcurl libxml2 \
                      libunistring boost luci-compat luci-proto-ipv6 bc pciutils \
                      lm-sensors jq yq coreutils unzip wget-ssl; do
            ./scripts/feeds install $pkg 2>/dev/null || true
          done
          ./scripts/feeds install -a

      # ===== 自定义文件 =====
      - name: Copy custom files
        run: |
          cd lede
          if [ -d "${{ github.workspace }}/files" ]; then
            cp -rf ${{ github.workspace }}/files/* ./
            chmod +x files/etc/uci-defaults/* 2>/dev/null || true
          fi

      # ===== 生成 .config（合并配置，所有 PassWall 依赖已在 common.config 中） =====
      - name: Generate .config
        run: |
          cd lede
          
          # 删除有问题的包
          rm -rf feeds/kenzo/luci-theme-alpha feeds/luci/luci-app-dae 2>/dev/null || true
          rm -rf feeds/kenzo/luci-app-dockerman 2>/dev/null || true
          
          if [ ! -f "${{ github.workspace }}/configs/common.config" ]; then
            echo "错误: common.config 不存在"
            exit 1
          fi
          if [ ! -f "${{ github.workspace }}/configs/${{ matrix.device }}.config" ]; then
            echo "错误: ${{ matrix.device }}.config 不存在"
            exit 1
          fi
          
          # 合并配置（common.config 已包含完整 PassWall 依赖）
          cat ${{ github.workspace }}/configs/common.config > .config
          cat ${{ github.workspace }}/configs/${{ matrix.device }}.config >> .config
          
          make defconfig

      # ===== Go 1.24 环境 + 预编译核心依赖 =====
      - name: Prebuild core dependencies with Go 1.24
        id: setup_go
        run: |
          cd lede
          
          wget -q https://go.dev/dl/go1.24.2.linux-amd64.tar.gz
          sudo tar -C /usr/local -xzf go1.24.2.linux-amd64.tar.gz
          echo "/usr/local/go/bin" >> $GITHUB_PATH
          echo "GOROOT=/usr/local/go" >> $GITHUB_ENV
          export PATH=/usr/local/go/bin:$PATH
          export GOROOT=/usr/local/go
          export GOPROXY=https://goproxy.io,direct
          go version

          make toolchain/compile -j$(nproc) || make toolchain/compile -j1 V=s
          make target/linux/compile -j$(nproc) || make target/linux/compile -j1 V=s
          
          # 预编译 Go 依赖
          for pkg in xray-core sing-box hysteria geoview; do
            make package/feeds/passwall_packages/$pkg/compile -j$(nproc) 2>/dev/null || true
          done

      - name: Download sources
        run: |
          cd lede
          export PATH=/usr/local/go/bin:$PATH
          export GOROOT=/usr/local/go
          make download -j16

      # ===== 编译固件 =====
      - name: Compile firmware
        run: |
          cd lede
          export PATH=/usr/local/go/bin:$PATH
          export GOROOT=/usr/local/go
          
          echo "开始编译 ${{ matrix.device }}: $(date)"
          ccache -s
          
          if make -j$(nproc) 2>&1 | tee build.log; then
            echo "编译成功: $(date)"
          else
            echo "并行编译失败，清理后单线程重试..."
            make target/linux/clean
            for pkg in xray-core sing-box hysteria geoview; do
              make package/feeds/passwall_packages/$pkg/clean 2>/dev/null || true
            done
            make -j1 V=s
          fi
          ccache -s

      # ===== 整理产物 =====
      - name: Prepare artifacts
        run: |
          cd lede
          mkdir -p ../release/${{ matrix.device }}
          find bin/targets/ -type f \( -name "*.img.gz" -o -name "*.bin" -o -name "*.vmdk" -o -name "*.qcow2" -o -name "*.sdcard.img" -o -name "*-sysupgrade.*" \) 2>/dev/null | while read file; do
            cp "$file" "../release/${{ matrix.device }}/"
          done
          cd ../release/${{ matrix.device }}
          sha256sum * > sha256sums.txt 2>/dev/null
          echo "=== 生成的固件 ==="
          ls -lh

      # ===== 上传 Artifacts =====
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lede-${{ matrix.device }}
          path: release/${{ matrix.device }}
          retention-days: 7

      # ===== 发布 Release =====
      - name: Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: LEDE-${{ matrix.device }}-${{ github.run_number }}
          name: "LEDE Firmware for ${{ matrix.device }} - Build ${{ github.run_number }}"
          body: |
            ## LEDE 固件自动构建

            ### 版本信息
            - **设备**: ${{ matrix.device }}
            - **管理地址**: http://10.10.10.1
            - **用户名**: root | **密码**: password

            ### 包含插件
            - **PassWall** (科学上网，含 Hysteria/V2ray/Xray)
            - MosDNS (DNS 转发)
            - TurboACC (网络加速)
            - TTYD (网页终端)
            - Aurora 主题
            - ARP 绑定
          files: |
            release/${{ matrix.device }}/*.img.gz
            release/${{ matrix.device }}/*.bin
            release/${{ matrix.device }}/*.vmdk
            release/${{ matrix.device }}/*.qcow2
            release/${{ matrix.device }}/*.sdcard.img
            release/${{ matrix.device }}/*-sysupgrade.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}