name: Build LEDE Firmware

on:
  workflow_dispatch:
    inputs:
      device:
        description: '设备'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - r2s
          - cr660x
          - x86
  schedule:
    - cron: '0 20 * * 0'
  push:
    branches: [main]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        device: [r2s, cr660x, x86]
    name: Build LEDE for ${{ matrix.device }}

    steps:
      - name: Skip unwanted devices on manual trigger
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.device != 'all' && github.event.inputs.device != matrix.device
        run: |
          echo "跳过 ${{ matrix.device }}，仅编译 ${{ github.event.inputs.device }}"
          exit 0

      - name: Checkout builder config
        uses: actions/checkout@v4

      - name: Checkout LEDE source
        uses: actions/checkout@v4
        with:
          repository: coolsnowwolf/lede
          path: lede
          ref: master

      - name: Setup dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
            gettext git libssl-dev libelf-dev python3-distutils python3-dev \
            rsync unzip zlib1g-dev file wget subversion patch upx-ucl \
            ccache ecj fastjar jarwrapper java-propose-classpath libz-dev \
            libncurses5-dev libncursesw5-dev

      # ===== PassWall 官方方法一配置 =====
      - name: Configure feeds (PassWall official method)
        run: |
          cd lede
          
          # 在 feeds.conf.default 顶部插入 PassWall 官方源
          echo 'src-git passwall_packages https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git;main' > feeds.conf.default.new
          echo 'src-git passwall_luci https://github.com/Openwrt-Passwall/openwrt-passwall.git;main' >> feeds.conf.default.new
          echo 'src-git kenzo https://github.com/kenzok8/openwrt-packages.git' >> feeds.conf.default.new
          echo 'src-git small https://github.com/kenzok8/small.git' >> feeds.conf.default.new
          cat feeds.conf.default >> feeds.conf.default.new
          mv feeds.conf.default.new feeds.conf.default
          
          # 更新 feeds
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # ===== 克隆额外插件 =====
      - name: Clone additional plugins
        run: |
          cd lede
          git clone --depth 1 https://github.com/sbwml/luci-app-mosdns.git package/mosdns
          git clone --depth 1 https://github.com/chenmozhijin/luci-app-turboacc.git package/turboacc
          git clone --depth 1 https://github.com/tsl0922/ttyd.git package/ttyd
          git clone --depth 1 https://github.com/eamonxg/luci-theme-aurora.git package/aurora

      # ===== 生成配置文件 =====
      - name: Generate .config
        run: |
          cd lede
          
          # 基础配置
          cp ${{ github.workspace }}/configs/common.config .config
          cat ${{ github.workspace }}/configs/${{ matrix.device }}.config >> .config
          echo "CONFIG_CCACHE=y" >> .config
          
          # 修改默认 IP
          sed -i 's/192.168.1.1/10.10.10.1/g' package/base-files/files/bin/config_generate
          
          # PassWall 配置
          echo "CONFIG_PACKAGE_luci-app-passwall=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-passwall_Including_Hysteria=y" >> .config
          
          # 强制添加 PassWall 依赖（关键修复）
          echo "CONFIG_PACKAGE_xray-core=y" >> .config
          echo "CONFIG_PACKAGE_sing-box=y" >> .config
          echo "CONFIG_PACKAGE_v2ray-geodata=y" >> .config
          echo "CONFIG_PACKAGE_geoview=y" >> .config
          
          # 其他插件
          echo "CONFIG_PACKAGE_luci-app-mosdns=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-turboacc=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-ttyd=y" >> .config
          echo "CONFIG_PACKAGE_luci-theme-aurora=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-arpbind=y" >> .config
          
          # 禁用问题包
          echo "# CONFIG_PACKAGE_vlmcsd is not set" >> .config
          
          make defconfig

      # ===== 关键修复：预编译 PassWall 核心依赖 =====
      - name: Prebuild PassWall dependencies
        run: |
          cd lede
          
          echo "=== 预编译 toolchain ==="
          make toolchain/compile -j$(nproc)
          
          echo "=== 预编译 xray-core（最关键） ==="
          if grep -q "CONFIG_PACKAGE_xray-core=y" .config; then
            make package/xray-core/compile -j$(nproc) || make package/xray-core/compile -j1 V=s
          else
            echo "WARNING: xray-core 未在配置中"
          fi
          
          echo "=== 预编译 sing-box ==="
          make package/sing-box/compile -j$(nproc) || echo "sing-box 编译跳过"
          
          echo "=== 预编译 geoview ==="
          make package/geoview/compile -j$(nproc) || echo "geoview 编译跳过"
          
          echo "=== 预编译 v2ray-geodata ==="
          make package/v2ray-geodata/compile -j$(nproc) || echo "v2ray-geodata 编译跳过"
          
          echo "=== PassWall 依赖预处理完成 ==="

      - name: Download sources
        run: |
          cd lede
          make download -j16

      # ===== 编译固件（先编译依赖，再编译主包） =====
      - name: Compile firmware
        run: |
          cd lede
          echo "开始编译 ${{ matrix.device }}: $(date)"
          
          # 先编译 PassWall 的所有依赖包
          echo "=== 编译 PassWall 依赖包 ==="
          make package/feeds/passwall_packages/*/compile -j$(nproc) || true
          
          # 再编译 PassWall 主包
          echo "=== 编译 PassWall 主包 ==="
          make package/feeds/passwall_luci/luci-app-passwall/compile -j$(nproc) || true
          
          # 最后编译完整固件
          echo "=== 编译完整固件 ==="
          if make -j$(nproc); then
            echo "编译成功: $(date)"
          else
            echo "并行编译失败，尝试单线程..."
            make -j1 V=s
          fi

      - name: Prepare artifacts
        run: |
          cd lede
          mkdir -p ../release/${{ matrix.device }}
          find bin/targets/ -type f \( -name "*.img.gz" -o -name "*.bin" -o -name "*.vmdk" -o -name "*.qcow2" \) 2>/dev/null | while read file; do
            cp "$file" "../release/${{ matrix.device }}/"
          done
          cd ../release/${{ matrix.device }}
          sha256sum * 2>/dev/null > sha256sums.txt
          echo "=== 生成的固件 ==="
          ls -lh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lede-${{ matrix.device }}
          path: release/${{ matrix.device }}
          retention-days: 7

      - name: Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: LEDE-${{ matrix.device }}-${{ github.run_number }}
          name: "LEDE Firmware for ${{ matrix.device }} - Build ${{ github.run_number }}"
          body: |
            ## LEDE 固件自动构建
            
            ### 版本信息
            - **设备**: ${{ matrix.device }}
            - **管理地址**: http://10.10.10.1
            - **用户名**: root | **密码**: password
            
            ### 包含插件
            - **PassWall** (科学上网，含 Hysteria)
            - MosDNS (DNS 转发)
            - TurboACC (网络加速)
            - TTYD (网页终端)
            - Aurora (现代化主题)
            - ARP 绑定
            
            ### 依赖说明
            - PassWall 所需依赖（xray-core、sing-box、geoview 等）已预编译
          files: |
            release/${{ matrix.device }}/*.img.gz
            release/${{ matrix.device }}/*.bin
            release/${{ matrix.device }}/*.vmdk
            release/${{ matrix.device }}/*.qcow2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}