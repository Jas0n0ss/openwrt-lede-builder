name: Build LEDE Firmware

on:
  workflow_dispatch:
    inputs:
      device:
        description: '设备'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - r2s
          - cr660x
          - ax6000
          - x86_64
          - raspberrypi-4b
  schedule:
    - cron: '0 20 * * 0'

permissions:
  contents: write

env:
  TZ: Asia/Shanghai
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  CCACHE_DIR: ~/.ccache
  CCACHE_COMPRESS: "true"
  CCACHE_MAXSIZE: 2G

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.device }}" != "all" ]; then
            echo 'matrix={"device":["${{ github.event.inputs.device }}"]}' >> $GITHUB_OUTPUT
          else
            echo 'matrix={"device":["r2s","cr660x","ax6000","x86_64","raspberrypi-4b"]}' >> $GITHUB_OUTPUT
          fi

  build:
    needs: setup
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    name: Build LEDE for ${{ matrix.device }}

    steps:
      - name: Checkout builder config
        uses: actions/checkout@v4

      - name: Checkout LEDE source
        uses: actions/checkout@v4
        with:
          repository: coolsnowwolf/lede
          path: lede
          ref: master
          fetch-depth: 1

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android
          sudo docker image prune -af
          df -h

      # ===== 缓存步骤 =====
      - name: Cache downloads (dl)
        uses: actions/cache@v4
        with:
          path: lede/dl
          key: dl-${{ matrix.device }}-${{ hashFiles('configs/lede/**') }}
          restore-keys: |
            dl-${{ matrix.device }}-
            dl-
      - name: Cache feeds
        uses: actions/cache@v4
        with:
          path: lede/feeds
          key: feeds-${{ hashFiles('configs/lede/**') }}
          restore-keys: |
            feeds-
      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ matrix.device }}-${{ hashFiles('configs/lede/**') }}
          restore-keys: |
            ccache-${{ matrix.device }}-
            ccache-

      - name: Setup dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
            gettext git libssl-dev libelf-dev python3-distutils python3-dev \
            rsync unzip zlib1g-dev file wget subversion patch upx-ucl \
            ccache ecj fastjar jarwrapper java-propose-classpath libz-dev \
            libncurses5-dev libncursesw5-dev

      - name: Setup feeds and custom packages
        run: bash ${{ github.workspace }}/scripts/setup-custom-packages.sh lede lede

      - name: Copy custom files
        run: |
          cd lede
          if [ -d "${{ github.workspace }}/files" ]; then
            cp -rf ${{ github.workspace }}/files/* ./
            chmod +x files/etc/uci-defaults/* 2>/dev/null || true
            chmod +x etc/uci-defaults/* 2>/dev/null || true
          fi

      - name: Generate .config
        run: |
          cd lede
          if [ ! -f "${{ github.workspace }}/configs/lede/common.config" ]; then
            echo "错误: common.config 不存在"
            exit 1
          fi
          if [ ! -f "${{ github.workspace }}/configs/lede/${{ matrix.device }}.config" ]; then
            echo "错误: ${{ matrix.device }}.config 不存在"
            exit 1
          fi
          cat ${{ github.workspace }}/configs/lede/common.config > .config
          cat ${{ github.workspace }}/configs/lede/${{ matrix.device }}.config >> .config
          cat ${{ github.workspace }}/configs/custom-plugins.config >> .config
          echo "CONFIG_DEVEL=y" >> .config
          echo "CONFIG_CCACHE=y" >> .config
          make defconfig

      - name: Prebuild core dependencies with Go 1.24
        id: setup_go
        run: |
          cd lede
          wget -q https://go.dev/dl/go1.24.2.linux-amd64.tar.gz
          sudo tar -C /usr/local -xzf go1.24.2.linux-amd64.tar.gz
          echo "/usr/local/go/bin" >> $GITHUB_PATH
          echo "GOROOT=/usr/local/go" >> $GITHUB_ENV
          export PATH=/usr/local/go/bin:$PATH
          export GOROOT=/usr/local/go
          go version
          make toolchain/compile -j$(nproc) || make toolchain/compile -j1 V=s
          make target/linux/compile -j$(nproc) || make target/linux/compile -j1 V=s
          make package/xray-core/compile -j$(nproc) || make package/xray-core/compile -j1 V=s

      - name: Download sources
        run: |
          cd lede
          make download -j16

      - name: Compile firmware
        run: |
          cd lede
          export PATH="/usr/lib/ccache:/usr/local/go/bin:$PATH"
          export GOROOT=/usr/local/go
          ulimit -n 65535
          echo "开始编译 ${{ matrix.device }}: $(date)"
          ccache -z
          ccache -s
          if make -j$(nproc); then
            echo "编译成功: $(date)"
          else
            echo "并行编译失败，清理后单线程重试..."
            make target/linux/clean
            make package/xray-core/clean
            make -j1 V=s
          fi
          ccache -s  # 显示最终缓存统计

      - name: Prepare artifacts
        run: |
          cd lede
          mkdir -p ../release/${{ matrix.device }}
          shopt -s nullglob
          mapfile -t artifacts < <(
            find bin/targets/ -type f \( \
              -name "*.img.gz" -o -name "*.bin" -o -name "*.vmdk" -o \
              -name "*.qcow2" -o -name "*.sdcard.img" -o -name "*-sysupgrade.*" \
            \)
          )
          if [ "${#artifacts[@]}" -eq 0 ]; then
            echo "错误: bin/targets 下未找到固件"
            find bin/targets -type f | head -50 || true
            exit 1
          fi
          cp "${artifacts[@]}" "../release/${{ matrix.device }}/"
          cd ../release/${{ matrix.device }}
          if ! ls * >/dev/null 2>&1; then
            echo "错误: 未找到固件产物"
            exit 1
          fi
          sha256sum * > sha256sums.txt
          echo "=== 生成的固件 ==="
          ls -lh
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lede-${{ matrix.device }}
          path: release/${{ matrix.device }}
          retention-days: 7

      - name: Release
        if: success() && github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: LEDE-${{ matrix.device }}-${{ github.run_number }}
          name: "LEDE Firmware for ${{ matrix.device }} - Build ${{ github.run_number }}"
          body: |
            ## LEDE 固件自动构建
            - **设备**: ${{ matrix.device }}
            - **管理地址**: http://10.10.10.1
            - **用户名**: root | **密码**: password
          files: |
            release/${{ matrix.device }}/*.img.gz
            release/${{ matrix.device }}/*.bin
            release/${{ matrix.device }}/*.vmdk
            release/${{ matrix.device }}/*.qcow2
            release/${{ matrix.device }}/*.sdcard.img
            release/${{ matrix.device }}/*-sysupgrade.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}