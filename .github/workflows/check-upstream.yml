name: Check OpenWrt Upstream

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Get LEDE latest commit
        id: lede
        run: echo "commit=$(curl -fsSL https://api.github.com/repos/coolsnowwolf/lede/commits/master | jq -r '.sha')" >> "$GITHUB_OUTPUT"

      - name: Get ImmortalWrt latest commit
        id: immortal
        run: echo "commit=$(curl -fsSL https://api.github.com/repos/immortalwrt/immortalwrt/commits/master | jq -r '.sha')" >> "$GITHUB_OUTPUT"

      - name: Restore upstream cache
        uses: actions/cache@v5
        with:
          path: .upstream_commit
          key: upstream-commit

      - name: Compare and trigger build
        run: |
          LEDE_LATEST="${{ steps.lede.outputs.commit }}"
          IMM_LATEST="${{ steps.immortal.outputs.commit }}"
          LEDE_TRIGGER=false
          IMM_TRIGGER=false

          if [ -e .upstream_commit ] && [ ! -d .upstream_commit ]; then
            rm -f .upstream_commit
          fi
          mkdir -p .upstream_commit

          if [ ! -f .upstream_commit/lede ] || [ "$(cat .upstream_commit/lede)" != "$LEDE_LATEST" ]; then
            LEDE_TRIGGER=true
          fi
          echo "$LEDE_LATEST" > .upstream_commit/lede

          if [ ! -f .upstream_commit/immortalwrt ] || [ "$(cat .upstream_commit/immortalwrt)" != "$IMM_LATEST" ]; then
            IMM_TRIGGER=true
          fi
          echo "$IMM_LATEST" > .upstream_commit/immortalwrt

          trigger() {
            local source="$1"
            local code
            code=$(curl -fsS -o /tmp/trigger.json -w "%{http_code}" -X POST \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/build.yml/dispatches" \
              -d "{\"ref\":\"main\",\"inputs\":{\"source\":\"${source}\",\"device\":\"all\"}}")
            [ "$code" = "204" ] || { echo "Trigger failed HTTP $code"; cat /tmp/trigger.json; exit 1; }
            echo "Triggered build.yml source=${source}"
          }

          [ "$LEDE_TRIGGER" = true ] && trigger lede
          [ "$IMM_TRIGGER" = true ] && trigger immortalwrt
          [ "$LEDE_TRIGGER" != true ] && [ "$IMM_TRIGGER" != true ] && echo "No upstream changes"

      - name: Save upstream cache
        uses: actions/cache@v5
        with:
          path: .upstream_commit
          key: upstream-commit
